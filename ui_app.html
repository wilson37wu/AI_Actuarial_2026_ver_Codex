<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Actuarial Stochastic Model -- Offline Result UI</title>
<style>
  :root{
    --bg:#0f141b; --panel:#161e29; --panel2:#1d2733; --ink:#e7edf5; --muted:#93a1b3;
    --line:#283545; --accent:#4f9cff; --pass:#39d98a; --warn:#ffb454; --fail:#ff6b6b;
    --chip:#22303f;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{padding:18px 22px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#16202c,#0f141b)}
  h1{margin:0 0 4px;font-size:19px;font-weight:650}
  .sub{color:var(--muted);font-size:12.5px}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;margin:14px 0 0}
  .tab{padding:8px 14px;border:1px solid var(--line);border-bottom:none;
    background:var(--panel);color:var(--muted);border-radius:8px 8px 0 0;cursor:pointer;font-size:13px}
  .tab.active{background:var(--panel2);color:var(--ink);font-weight:600}
  .panel{display:none;background:var(--panel2);border:1px solid var(--line);
    border-radius:0 8px 8px 8px;padding:18px;margin-bottom:30px}
  .panel.active{display:block}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:6px 0 16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .card .k{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em}
  .card .v{font-size:20px;font-weight:650;margin-top:3px}
  table{border-collapse:collapse;width:100%;font-size:13px}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;
    position:sticky;top:0;background:var(--panel2)}
  tr:hover td{background:#1a2531}
  .chip{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11.5px;font-weight:600;
    background:var(--chip);border:1px solid var(--line)}
  .chip.pass{color:var(--pass);border-color:#1f5e44}
  .chip.warn{color:var(--warn);border-color:#5e4a1f}
  .chip.fail{color:var(--fail);border-color:#5e2222}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;color:var(--muted)}
  .gate-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:6px}
  .gate{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .gate h4{margin:0 0 2px;font-size:14px}
  .gate .params{margin-top:8px;font-size:12.5px;color:var(--muted)}
  .gate .params b{color:var(--ink);font-weight:600}
  .critgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:6px;margin:4px 0 14px}
  .crit{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);
    border-radius:7px;padding:6px 10px;font-size:12.5px}
  .crit .cic{font-weight:700;width:14px;text-align:center}
  .crit.pass .cic{color:var(--pass)} .crit.fail .cic{color:var(--fail)}
  .subh{margin:12px 0 6px;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .ptable{margin-bottom:14px}
  .calibpanel{padding:14px 16px}
  .calibpanel h4{margin:0 0 2px;font-size:14.5px}
  .filter{margin:2px 0 12px}
  .filter input,.filter select{background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:7px;padding:6px 9px;font-size:13px}
  .muted{color:var(--muted)}
  .note{color:var(--muted);font-size:12.5px;margin-top:10px}
  details{margin-top:12px}
  summary{cursor:pointer;color:var(--accent);font-size:13px}
  pre{background:#0c1118;border:1px solid var(--line);border-radius:8px;padding:12px;overflow:auto;
    font-size:11.5px;color:#cbd6e4}
  .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:var(--chip);
    border:1px solid var(--line);color:var(--muted);margin-left:6px}
  .scaffold{color:var(--muted);font-size:13px;padding:8px 0}
  .dz{margin-top:14px;border:1px dashed var(--line);border-radius:10px;padding:14px;color:var(--muted);font-size:12.5px}
  .subnav{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 14px}
  .segbtn{padding:6px 12px;border:1px solid var(--line);background:var(--panel);color:var(--muted);
    border-radius:7px;cursor:pointer;font-size:12.5px}
  .segbtn.active{background:var(--accent);border-color:var(--accent);color:#06101c;font-weight:650}
  .chartwrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 14px 10px;margin-bottom:14px}
  .chartwrap h4{margin:0 0 2px;font-size:14px}
  .chartwrap .cap{color:var(--muted);font-size:12px;margin:0 0 10px}
  svg.chart{display:block;width:100%;height:auto;overflow:visible;margin-top:2px}
  svg.chart text{fill:var(--muted);font:11px -apple-system,Segoe UI,Roboto,sans-serif}
  svg.chart text.val{fill:var(--ink);font-weight:600}
  svg.chart .axis{stroke:var(--line);stroke-width:1}
  svg.chart .grid{stroke:#22303f;stroke-width:1;stroke-dasharray:3 3}
  svg.chart .bar{transition:opacity .12s}
  svg.chart .bar:hover,svg.chart circle:hover{opacity:.82;cursor:pointer}
  svg.chart .refline{stroke-width:1.5}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:8px 2px 0;font-size:12px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .tipbox{position:fixed;z-index:50;pointer-events:none;background:#0c1118;border:1px solid var(--line);
    border-radius:7px;padding:7px 9px;font-size:12px;color:var(--ink);max-width:280px;line-height:1.45;
    box-shadow:0 6px 20px rgba(0,0,0,.45);opacity:0;transition:opacity .08s}
  .tipbox.on{opacity:1}
  .gbar{height:9px;background:var(--panel);border:1px solid var(--line);border-radius:999px;overflow:hidden;margin:4px 0 12px}
  .gbar-fill{height:100%;background:var(--pass)}
  .timeline{position:relative;margin-top:6px}
  .tl-item{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
  .tl-dot{width:11px;height:11px;border-radius:50%;margin-top:5px;flex:0 0 auto;background:var(--muted)}
  .tl-dot.pass{background:var(--pass)} .tl-dot.warn{background:var(--warn)} .tl-dot.fail{background:var(--fail)}
  .tl-body{flex:1 1 auto;min-width:0}
  .tl-head{margin-bottom:2px}
  .tl-soh{padding:6px 0 6px 10px;border-left:2px solid var(--line);margin:5px 0}
  .rdetbox{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12.5px}
  .heatwrap{max-width:460px;margin:0 0 10px}
  .auditbadge{display:inline-block;padding:8px 14px;border-radius:8px;font-weight:700;font-size:13px}
  .auditbadge.ok{color:var(--pass);background:rgba(57,217,138,.12);border:1px solid #1f5e44}
  .auditbadge.bad{color:var(--fail);background:rgba(255,107,107,.12);border:1px solid #5e2222}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .tbtn{padding:6px 12px;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:7px;cursor:pointer;font-size:12.5px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .tab,.segbtn{font-family:inherit}
  .tab:focus-visible,.tbtn:focus-visible,.segbtn:focus-visible,.rrow:focus-visible,.crow:focus-visible,.panel:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  @media print{
    :root{--bg:#fff;--panel:#fff;--panel2:#fff;--ink:#111;--muted:#444;--line:#bbb;--chip:#eee;--accent:#15489c}
    body{background:#fff;color:#111}
    header{background:#fff;border-color:#bbb}
    .toolbar,.tabs,.dz,.filter,#__tip,details>summary{display:none !important}
    .panel{display:block !important;border:none;border-radius:0;padding:0;margin:0 0 22px;background:#fff}
    .panel::before{display:block;content:attr(data-title);font-size:16px;font-weight:700;margin:0 0 10px;color:#111;border-bottom:2px solid #111;padding-bottom:4px}
    .chartwrap,.gate,.card,table,.tl-item{page-break-inside:avoid}
    svg.chart text{fill:#111} svg.chart text.val{fill:#000}
    .card,.gate,.chartwrap{border-color:#bbb}
    a{color:#111}
  }
</style>
</head>

023 reserve valuation guidance). This produces an understated liability reserve and overstated solvency margin.", "mitigation": "Reduce discount rate to \u22643.0% in Phase 4 calibration; document deviation formally per ASOP 25 \u00a73.3.", "related_standard": "SOA ASOP 25 \u00a73.3; CBIRC Reserve Valuation Guidance 2023", "updated_at": "2026-06-04T05:28:13.393982+00:00"}, {"risk_id": "MR-002", "title": "Investment return assumptions overstated vs CNY market", "overall_rating": "HIGH", "mitigation_status": "MITIGATED", "category": "assumption_error", "owner": "Assumption Owner", "likelihood": "HIGH", "impact": "HIGH", "description": "Bond return assumptions (4.0\u20135.0%) are 100\u2013180 bps above current CNY government bond yields (2.2\u20132.6% as of calibration date). Equity ERP has not been calibrated. This systematically understates TVOG and liability PV.", "mitigation": "Recalibrate bond returns and ERP to CNY market data in Phase 4 (GBMCalibrator); interim sensitivity analysis required.", "related_standard": "SOA ASOP 56 \u00a73.4; SOA ASOP 25 \u00a73.3", "updated_at": "2026-06-04T11:24:19.652316+00:00"}, {"risk_id": "MR-003", "title": "Dynamic lapse assumption absent", "overall_rating": "CRITICAL", "mitigation_status": "MITIGATED", "category": "model_error", "owner": "Model Developer", "likelihood": "MEDIUM", "impact": "CRITICAL", "description": "No dynamic lapse function is implemented. Dynamic lapse is the single most impactful assumption for TVOG and ALM under stressed rate scenarios. Static lapse at current flat rates will materially understate TVOG sensitivity (estimated \u00b115\u201330% TVOG per \u00b125% lapse shock per Phase 1 assessment).", "mitigation": "Dynamic lapse implemented and calibrated (Phase 13 Task 2); ChangeRecord assumption=\"dynamic_lapse\" APPROVED.", "related_standard": "SOA ASOP 7 \u00a73.3; IA TAS M \u00a73.5", "updated_at": "2026-06-06T00:17:39.182600+00:00"}, {"risk_id": "MR-004", "title": "P/Q measure not enforced at runtime", "overall_rating": "LOW", "mitigation_status": "MITIGATED", "category": "model_error", "owner": "Model Developer", "likelihood": "VERY_LOW", "impact": "CRITICAL", "description": "Prior to Phase 2, the codebase did not enforce or document the distinction between real-world (P) and risk-neutral (Q) scenario sets. Mixing measures is a critical actuarial error that invalidates both VaR/ES and TVOG outputs.", "mitigation": "Measure enum implemented in esg_process.py (Phase 2). LossDistribution enforces Measure.P for VaR/ES (risk_metrics.py); TVOGEngine enforces Measure.Q (tvog.py). Phase 14 Task 1: runtime guard _enforce_simulation_measure() now validates the requested measure against each generator's declared SUPPORTED_MEASURES in every simulate()/generate() execution path (HullWhite, G2++, GBM, FX, ScenarioSet), and _assert_output_measure() verifies the output measure stamp. 30 dedicated runtime tests (tests/test_measure_enforcement.py) PASS with genuine runtime execution evidence (numpy/scipy/pandas/pytest available in automation sandbox).", "related_standard": "SOA ASOP 56 \u00a73.1.3; IA TAS M \u00a73.4", "updated_at": "2026-06-04T10:30:44+00:00"}, {"risk_id": "MR-005", "title": "Distributed executor pickling failure", "overall_rating": "HIGH", "mitigation_status": "CLOSED", "category": "process_risk", "owner": "Model Developer", "likelihood": "HIGH", "impact": "HIGH", "description": "DistributedExecutor fails to serialise complex model objects for multiprocessing, causing 7 test failures in the original repository test suite. This blocks all distributed scenario execution, TVOG computation, and VaR/ES integration.", "mitigation": "RESOLVED \u2014 module-level `_execute_task_spec` callable + `make_partial_task` binder; verified by 63 tests.", "related_standard": "SOA ASOP 56 \u00a73.5 (scenario adequacy requires successful batch execution)", "updated_at": "2026-06-04T09:16:43.834338+00:00"}, {"risk_id": "MR-006", "title": "Model validation readiness below production threshold", "overall_rating": "CRITICAL", "mitigation_status": "IN_PROGRESS", "category": "governance_risk", "owner": "Assumption Owner", "likelihood": "HIGH", "impact": "CRITICAL", "description": "Overall validation readiness assessed at 2/5 (development-grade). Stochastic validation (scenario convergence, martingale test, VaR/ES integration) is entirely absent. Model is not fit for regulatory reporting or production use in current state.", "mitigation": "4-layer validation framework implementation across Phases 3\u20134. Full validation cadence in Phase 5.", "related_standard": "SOA ASOP 56 \u00a73.5; IA TAS M \u00a73.6; APS X2", "updated_at": "2026-05-18T02:18:55.749042+00:00"}, {"risk_id": "MR-007", "title": "No assumption change control process", "overall_rating": "HIGH", "mitigation_status": "IN_PROGRESS", "category": "governance_risk", "owner": "Assumption Owner", "likelihood": "HIGH", "impact": "HIGH", "description": "The model has no documented assumption change control process. Any assumption can be changed without sign-off, impact assessment, or audit trail. This is a material IA TAS M \u00a73.7 gap.", "mitigation": "GovernanceStore + ChangeRecord + SignOffWorkflow implemented in Phase 2, Task 4 (this module). Requires organisational adoption.", "related_standard": "IA TAS M \u00a73.7; IA TAS M \u00a73.3", "updated_at": "2026-05-18T02:18:55.749049+00:00"}, {"risk_id": "MR-008", "title": "HW1F calibration not yet executed", "overall_rating": "CRITICAL", "mitigation_status": "OPEN", "category": "model_error", "owner": "Model Developer", "likelihood": "HIGH", "impact": "CRITICAL", "description": "HullWhiteCalibrator.calibrate() is a NotImplementedError stub. HW1F parameters (a=0.10, \u03c3_r=0.012) are placeholders producing model swaption vol ~250 bps vs ~42 bps market \u2014 a 6x error. All interest rate paths and ZCB prices derived from these parameters are unreliable.", "mitigation": "Implement L-BFGS-B calibration in Phase 4 using CNY swaption market data.", "related_standard": "SOA ASOP 56 \u00a73.4; SOA ASOP 25 \u00a73.3", "updated_at": "2026-05-18T02:18:55.749056+00:00"}, {"risk_id": "MR-009", "title": "Educational guided-examples wrapper drifted from model API", "overall_rating": "VERY_LOW", "mitigation_status": "CLOSED", "category": "operational_risk", "owner": "Model Developer", "likelihood": "LOW", "impact": "LOW", "description": "par_model_v2/examples/guided_examples.py references attributes removed from RiskFreeCurve (calibration_date/model_label/discount_factors) and FixedIncomeInstrument (term_months/par_value/oas_bps) and an outdated project_fixed_income_cashflows signature; tests/test_guided_examples.py errors (3 failed / 46 errors). Surfaced by the Phase 13 Task 4 IA TAS M \u00a73.6 validation run. Educational wrapper only; backs no IA TAS M \u00a73.6 requirement; production reporting engine (reporting_cycle.py) is tested separately and passes.", "mitigation": "Migrate the fixed-income / TVOG / HK-liability sections of guided_examples.py to the current APIs in a dedicated change-controlled cycle; re-run tests/test_guided_examples.py to green.", "related_standard": "IA TAS M \u00a73.6; SOA ASOP 56 \u00a73.5", "updated_at": "2026-06-04T12:37:49.737472+00:00"}, {"risk_id": "MR-010", "title": "Variance-covariance aggregation understates diversified capital", "overall_rating": "HIGH", "mitigation_status": "MITIGATED", "category": "model_error", "owner": "Model Owner", "likelihood": "MEDIUM", "impact": "HIGH", "description": "The standard-formula (variance-covariance) aggregation fed with the raw ESG rate/equity factor correlation understates the fully-diversified nested tail capital by ~33% (29,031 vs 43,251 at 99.5%). The realised capital-loss correlation is +0.55 vs the -0.15 factor correlation because the equity maturity guarantee and rate-driven guaranteed-benefit legs lose value in the same direction under joint down-rate/down-equity stress.", "mitigation": "Benchmark all aggregated figures to the multi-driver nested run; aggregate on the empirical capital-loss correlation rather than the raw ESG factor correlation; document gap in the limitation card. Educational only; not used for any capital decision.", "related_standard": "SOA ASOP 56 \u00a73.5; IA TAS M \u00a73.6; SOA ASOP 25 \u00a73.3", "updated_at": "2026-06-08T01:31:12.922427+00:00"}, {"risk_id": "MR-011", "title": "Multi-driver economic-capital proxy is educational, not production capital", "overall_rating": "HIGH", "mitigation_status": "MITIGATED", "category": "model_error", "owner": "Model Owner", "likelihood": "MEDIUM", "impact": "HIGH", "description": "The Phase 15 multi-driver (short-rate + equity) nested/LSMC economic-capital proxy (Tasks 1-4) is fitted on PLACEHOLDER HW1F / GBM parameters, omits material risk drivers (lapse, mortality/longevity trend, credit spread, FX, liquidity, management action), uses an educational single-guarantee liability, and has NOT been independently reviewed (APS X2). The 99.5% VaR/ES and SCR-proxy figures it produces are illustrative only and must not be used for regulatory or internal economic-capital reporting until parameters are calibrated to credentialled market data, the omitted drivers are brought into the tail, and an independent reviewer signs off.", "mitigation": "Classify all multi-driver capital output as EDUCATIONAL ONLY in the limitation card and at the API boundary; bound proxy error by the Task 2 out-of-sample validation (OOS R^2=0.9704, VaR rel err 3.21%) and outer-sampling error by the Task 4 bootstrap CI (SE ~1.66%); benchmark every aggregated figure to the Task 3 nested ground truth. Residual closure requires credentialled-data calibration + independent APS X2 review (tracked jointly with MR-006 / MR-008).", "related_standard": "IA TAS M \u00a73.6; APS X2 \u00a73; SOA ASOP 56 \u00a73.5", "updated_at": "2026-06-07T08:25:03.762431+00:00"}, {"risk_id": "MR-012", "title": "Credit-spread driver and three-driver economic-capital proxy are educational, not production capital", "overall_rating": "HIGH", "mitigation_status": "MITIGATED", "category": "model_error", "owner": "Model Owner", "likelihood": "MEDIUM", "impact": "HIGH", "description": "Phase 17 adds a CIR++ mean-reverting credit-spread driver (par_model_v2/stochastic/credit_spread.py) as the third risk factor in the nested/LSMC economic-capital proxy (rate + equity + credit-spread), with a reduced-form hazard x LGD credit-loss component on spread-sensitive backing assets. The CIR++ parameters (mean-reversion, long-run spread, vol, risk premium) and the hazard/LGD assumptions are PLACEHOLDER educational defaults, NOT calibrated to credentialled credit-market data; the trivariate LSMC surface still omits material drivers (lapse, mortality/longevity trend, FX, liquidity, management action) and has NOT been independently reviewed (APS X2). The three-driver 99.5% VaR/ES and SCR-proxy figures are illustrative only and must not be used for regulatory or internal economic-capital reporting until the credit parameters are calibrated, the omitted drivers are brought into the tail, and an independent reviewer signs off.", "mitigation": "Classify all three-driver capital output as EDUCATIONAL ONLY in the consolidated limitation card and at the API boundary; bound proxy error by the Task 2 trivariate out-of-sample validation (OOS R^2=0.9751; selected basis deg1/max-int3; leakage-free) and outer-sampling error by the Task 4 three-driver bootstrap CI (VaR 150,859 with 95% CI [149,634, 152,369], SE 692 / +-0.91%); benchmark every aggregated figure to the Task 3 three-driver nested ground truth. Residual closure requires credentialled credit-data calibration + independent APS X2 review (tracked jointly with MR-006 / MR-008 / MR-011).", "related_standard": "IA TAS M \u00a73.6; APS X2 \u00a73; SOA ASOP 56 \u00a73.5; ASOP 25 \u00a73.3", "updated_at": "2026-06-07T09:14:22.447046+00:00"}, {"risk_id": "MR-013", "title": "Two-factor rates market consistency not fully calibrated", "overall_rating": "HIGH", "mitigation_status": "IN_PROGRESS", "category": "model_error", "owner": "Assumption Owner", "likelihood": "MEDIUM", "impact": "HIGH", "description": "The G2++ rates driver now has analytic zero-coupon and bond-option formulas, but parameters are educational until calibrated to a swaption volatility surface and validated through martingale and capital-impact gates.", "mitigation": "Complete Phase 20 Tasks 2-4: swaption-surface calibration, market-consistency martingale gate, and capital re-aggregation/tail diagnostics with independent review.", "related_standard": "SOA ASOP 56 section 3.5; IA TAS M section 3.6", "updated_at": "2026-06-06T09:25:48.971900+00:00"}, {"risk_id": "MR-014", "title": "Management-action omission in liability / capital model", "overall_rating": "HIGH", "mitigation_status": "MITIGATED", "category": "assumption_error", "owner": "ChiefActuary", "likelihood": "HIGH", "impact": "MEDIUM", "description": "Policyholder options (dynamic lapse) are modelled but insurer management actions are not: reversionary-bonus participation is static, so TVOG and tail capital are biased upward relative to a realistic with-management-action basis (ASOP 56 3.1.3 asymmetry; Solvency II Art. 23).", "mitigation": "Phase 23 Task 3: governed dynamic reversionary-bonus participation cut entering the nested ground truth and the proxy basis, validated OOS at fixed pre-registered gates.", "related_standard": "ASOP 56 3.1.3/3.4; TAS M 3.2; SII Art. 23", "updated_at": "2026-06-08T01:31:12.922476+00:00"}, {"risk_id": "MR-015", "title": "Copula-FORM / radial-asymmetry residual not closed by the skew-t upper-tail scalar", "overall_rating": "HIGH", "mitigation_status": "OPEN", "category": "model_error", "owner": "Head of Capital Modelling (educational placeholder)", "likelihood": "MEDIUM", "impact": "HIGH", "description": "The frozen-t copula-form residual (~6,120; 91.9% of the 14.29% nested-vs-frozen gap) is NOT a standalone-driver upper-tail radial-asymmetry effect: fitting the GH skew-t skewness gamma leakage-free to the realised upper-tail co-exceedances pins it at the boundary (gamma_hat ~ 6.2e-5), so the skew-t draw is near-radially-symmetric (radial asymmetry ~ 0 at p=0.90) and the copula-form residual falls only ~0.09% (6,120 -> 6,115). The residual lives in nested inner-path joint dynamics that a copula on standalone margins cannot represent.", "mitigation": "Escalate the dependence structure beyond a single radially (a)symmetric copula: grouped-t (Daul et al. 2003) as the indicated next step, vine / pair-copula (Aas et al. 2009) the general fallback; scheduled for Phase 28. Until then the residual is quantified, disclosed, and the path-wise nested truth (46,638.9) is reported alongside the frozen-copula component (39,975.7).", "related_standard": "Solvency II Art. 234; Demarta & McNeil (2005); McNeil, Frey & Embrechts (2015) QRM ch.7; IFoA Modelling Practice Note s4", "updated_at": "2026-06-08T12:25:18.156272+00:00"}, {"risk_id": "MR-016", "title": "Heterogeneous-tail / cross-block-dilution copula-FORM residual not closed by the grouped-t per-block df", "overall_rating": "HIGH", "mitigation_status": "OPEN", "category": "model_error", "owner": "Head of Capital Modelling (educational placeholder)", "likelihood": "MEDIUM", "impact": "HIGH", "description": "The realised standalone within-FIN upper co-exceedance (0.125) sits BELOW the cross-block level (0.172), so the leakage-free per-block df fit pins df_NONFIN 37.866 / df_FIN 8.506 ABOVE the frozen 2.9451 (lighter within-block tails); on common random numbers the grouped-t therefore DILUTES cross-block co-movement vs the single-df t maximal-cross-block boundary (grouped cross-block upper 0.1703 < single 0.2573 at p=0.90) and moves the disclosed component SCR DOWN 10.93%. The copula-FORM residual to the nested truth WIDENS from the skew-t-reconfirmed 6,114.9 to 10,491.5 (Phase 28 Task 3). This is the SECOND negative super-set result after the skew-t (gamma_hat ~ 0): a single copula on the standalone margins, whether asymmetric or block-heterogeneous, cannot close the UPWARD nested residual; it lives in nested inner-path joint dynamics.", "mitigation": "Escalate the dependence structure beyond a single copula on the standalone margins: vine / pair-copula (Aas et al. 2009 - pair-copula constructions capturing conditional / inner-path joint dynamics) as the general fallback, scheduled for Phase 29. Until then the residual is quantified, disclosed, and the path-wise nested truth (46,638.9) is reported alongside the governed frozen-copula component (39,975.7, the conservative maximal-cross-block boundary) so users see the conservative bound; the grouped-t DOWN move is DISCLOSED, not adopted.", "related_standard": "Solvency II Art. 234; Daul et al. (2003); McNeil, Frey & Embrechts (2015) QRM ch.7; Aas et al. (2009); IFoA Modelling Practice Note s4", "updated_at": "2026-06-10T23:24:29.560480+00:00"}, {"risk_id": "MR-017", "title": "Residual nested inner-path joint dynamics not representable by the truncated credit-root pair-link prototype (vine-FORM limitation)", "overall_rating": "HIGH", "mitigation_status": "OPEN", "category": "model_error", "owner": "Head of Capital Modelling (educational placeholder)", "likelihood": "MEDIUM", "impact": "HIGH", "description": "The Phase 29 truncated credit-root C-vine prototype (max two trees, capped pair-family set, rank-preserving tail tilts on the frozen single-df t base) NARROWS the copula-form residual to 3,637.3 (from skew-t 6,114.9 / grouped-t 10,491.5) and lifts the component SCR +2,314.4 mean (CRN, positive in 100% of replicates), but the nested path-wise truth 46,638.9 remains OUTSIDE the vine 95% bootstrap CI [38,654.7, 45,284.3]. The remaining residual is attributed to (i) the truncation at two trees, (ii) the capped pair-family set and educational tilt simulator (not a full vine calibration), and (iii) nested inner-path joint dynamics that margins-level dependence cannot represent. Task 4 fit-vs-holdout diagnostics show the tilt is concentrated on fitted links (max holdout |lift| 0.0414 <= max fitted-pair |lift| 0.8514), so the narrowing is not an overfit artefact of never-fitted pairs.", "mitigation": "Candidate next steps (design-note-first, owner sign-off required): full conditional pair-copula calibration (h-function based, untruncated where material), nested-aware dependence calibrated on inner-path joint outcomes, or adoption of the vine candidate as a DISCLOSED alternative read-out alongside the governed frozen-t headline. Until then the residual is quantified and disclosed; the nested truth 46,638.9 is reported alongside the governed component 39,975.7.", "related_standard": "Aas et al. (2009); Joe (2014) ch.2; Solvency II Art. 234; IFoA Modelling Practice Note s4", "updated_at": "2026-06-10T23:24:29.560550+00:00"}]}, "verdicts": [{"key": "proxy", "label": "Out-of-sample proxy validation", "verdict": "PASS \u2014 selected basis (deg 1, max_int 3) validated OOS (R^2=0.9616, VaR rel err=2.03%, leakage-free, overfit gap=0.0031)"}, {"key": "aggregation", "label": "Correlated risk aggregation", "verdict": "PASS - seven-driver copula aggregation (selected: gaussian) with G-LIQX-CALIBRATED liquidity exposure + couplings reconciles to nested capital within 14.6% vs var-covar understatement 40.5%; MR-010 re-confirmed and mitigated", "source": "docs/validation/PHASE22_TASK4_AGGREGATION_REPORT.json"}, {"key": "tail", "label": "Tail convergence & stability", "verdict": "PASS - seven-driver 99.5% capital metric (G-LIQX-CALIBRATED liquidity inputs) converges (copula-simulated), is bounded by simulated and honest small-sample nested bootstrap CIs, and benefits from Sobol-RQMC variance reduction", "source": "docs/validation/PHASE22_TASK4_AGGREGATION_REPORT.json"}, {"name": "G-MART market-consistency gate", "verdict": "PASS", "evidence": "worst 1.22 sigma; max rel error 0.0003903; 40000 scenarios", "source": "docs/validation/PHASE20_TASK3_G_MART_REPORT.json"}, {"name": "G2++ five-driver capital re-aggregation", "verdict": "PASS", "evidence": "PASS - five-driver copula aggregation (selected: gaussian) reconciles to nested capital within 12.4% vs var-covar 39.7%; MR-010 five-driver mitigation confirmed", "source": "docs/validation/PHASE20_TASK4_AGGREGATION_REPORT.json"}, {"name": "G-FX FX-driver plausibility gate (6th driver)", "verdict": "PASS", "evidence": "6/6 criteria passed incl. MART-FX-CIP Q-measure martingale", "source": "docs/validation/PHASE21_TASK1_FX_DRIVER_REPORT.json"}, {"name": "Six-driver OOS proxy validation (REMEDIATED, Phase 22 Task 1)", "verdict": "PASS", "evidence": "Remediation: inner 96->256, staged-CRN outer uplift, targeted deg-2 basis; OOS R2=0.9985, max |rel err| 2.02%, overfit gap -0.0008 - prior honest PARTIAL superseded", "source": "docs/validation/PHASE22_TASK1_OOS_REMEDIATION_REPORT.json"}, {"name": "G-LIQ liquidity-calibration gate (7th driver)", "verdict": "PASS", "evidence": "HKD: n=240, kappa=0.9345, long_run=0.0063 (63bp), sigma=0.0213, lambda=2.0000", "source": "docs/validation/PHASE21_TASK3_LIQUIDITY_CALIBRATION_REPORT.json"}, {"name": "Seven-driver capital aggregation (G-LIQX-CALIBRATED inputs, Phase 22 Task 4)", "verdict": "PASS", "evidence": "Calibrated re-run: var-covar understates nested by 40.5%; copula rel err 14.6%; tail diagnostics re-run converged; capital impact of calibration bounded (liquidity SCR 63.5->45.1)", "source": "docs/validation/PHASE22_TASK4_AGGREGATION_REPORT.json"}, {"name": "Seven-driver OOS proxy validation (liquidity included)", "verdict": "PASS", "evidence": "PASS - seven-driver surface (analytic, deg 3, max_int 2, 46 terms) validated OOS (R2=0.9985, VaR/ES/SCR rel err 0.51%/0.18%/1.26%, liquidity offset exact, leakage-free)", "source": "docs/validation/PHASE22_TASK2_7D_PROXY_VALIDATION_REPORT.json"}, {"name": "G-LIQX liquidity exposure + coupling calibration gate", "verdict": "PASS", "evidence": "HKD: n=1200, notional=22000, couplings={'liq_rate': -0.0794, 'liq_equity': -0.2935, 'liq_spread': 0.4579, 'liq_lapse': 0.1081, 'liq_mortality': 0.016, 'liq_fx':", "source": "docs/validation/PHASE22_TASK3_LIQUIDITY_EXPOSURE_REPORT.json"}, {"name": "Tail-matched Student-t copula aggregation (Phase 23 Task 2)", "verdict": "PASS", "evidence": "df matched 2.9451 from pooled tail-dependence; t-copula SCR 46756 vs nested 48707 (rel err 4.0%) vs gaussian 14.9% and var-covar understatement 40.5%", "source": "docs/validation/PHASE23_TASK2_T_COPULA_AGGREGATION_REPORT.json"}, {"name": "Management-action rule - dynamic reversionary-bonus cut (Phase 23 Task 3)", "verdict": "PASS", "evidence": "5/5 pre-registered gates; nested VaR99.5 -20587, SCR -16270; active on 44.2% of outer states; OOS R2 with actions 0.9983; proxy-vs-nested VaR rel err 0.51%; trigger sensitivity 1.05/1.10/1.15 all PASS", "source": "docs/validation/PHASE23_TASK3_MANAGEMENT_ACTION_REPORT.json"}, {"name": "Seven-driver aggregation WITH management actions (Phase 23 Task 4)", "verdict": "PASS", "evidence": "nested SCR 48707 -> 33118 (-32.0%); rank invariance gated (df 2.9451 unchanged); DISCLOSED: copula-on-standalone understates nested-with (t rel err 22.5%) - the action saturates in the joint tail; the nested run remains the capital reference", "source": "docs/validation/PHASE23_TASK4_AGGREGATION_WITH_ACTIONS_REPORT.json"}, {"name": "Joint-scenario action-after-aggregation t-copula (Phase 24 Task 2)", "verdict": "PASS", "evidence": "governed rule applied ONCE to the t(2.9451) joint liability: t-SCR 31001.8 vs nested-with 33117.8 (rel err 6.39% vs standalone-action baseline 22.54% - saturation gap closed); joint action only relieves; rank invariance re-gated", "source": "docs/validation/PHASE24_TASK2_JOINT_ACTION_REAGGREGATION_REPORT.json"}, {"name": "Inner-path management-action dynamics prototype (Phase 24 Task 3)", "verdict": "PASS", "evidence": "bonus cut applied to INNER-PATH benefit cashflows (credit loss + analytic offsets non-cuttable): OOS R2 0.9984, VaR rel err 0.40%; outer-node over-relief disclosed - nested SCR 39290.9 -> 40852.1 (+1561.2, +4.0%); the inner-path basis is the more conservative, more faithful with-actions basis", "source": "docs/validation/PHASE24_TASK3_INNER_PATH_ACTION_REPORT.json"}, {"name": "Joint-action tail diagnostics + capital-delta matrix (Phase 24 Task 4)", "verdict": "PASS", "evidence": "delta matrix complete (27/27 archive cross-checks, P24T2 reproduced bit-identically); 99.5% joint tail 100.0% saturated; var-covar understatement refreshed 56.4% vs nested-with / 53.5% vs t-joint (MR-010); margin-bootstrap 95% CI [26471, 33637] contains the nested-with reference (n_obs=160 noise quantified)", "source": "docs/validation/PHASE24_TASK4_JOINT_ACTION_TAIL_DIAGNOSTICS_REPORT.json"}, {"name": "Path-wise bonus declaration in the nested truth (Phase 25 Task 2)", "verdict": "PASS", "evidence": "per-time-step retained-bonus factor on the path-wise coverage proxy: nested with-actions SCR 46638.9 (path-wise) vs 40852.1 (horizon basis) = +14.17%; restoration share 29.4%; without-actions bit-identical; the path-wise basis relieves LESS - the more conservative with-actions read-out (recognition-lag effect, two-sided)", "source": "docs/validation/PHASE25_TASK2_PATHWISE_DECLARATION_REPORT.json"}, {"name": "Matching path-wise proxy basis + seven-driver OOS re-validation (Phase 25 Task 3)", "verdict": "PASS", "evidence": "smoothed-relief response surface (sigma 0.225, alpha 0.7567; FIT-only, leakage-free): OOS R2 0.9978, VaR rel err 0.40%, SCR rel err 1.16% on the path-wise with-actions basis; truth and proxy use the IDENTICAL path-wise action basis", "source": "docs/validation/PHASE25_TASK3_PATHWISE_PROXY_BASIS_REPORT.json"}, {"name": "Path-wise tail diagnostics + capital-delta matrix (Phase 25 Task 4)", "verdict": "PASS", "evidence": "path-wise relieves LESS at every confidence level (the horizon basis understates the with-actions SCR across the matrix); var-covar understatement refreshed 69.1% vs nested path-wise (MR-010); copula FROZEN (df 2.9451 re-matched); margin-bootstrap 95% CI [35793, 42496] - nested path-wise reference OUTSIDE the CI (the analytic re-anchoring understates nested by 14.7% beyond noise; DISCLOSED motivation for full path-wise copula re-aggregation)", "source": "docs/validation/PHASE25_TASK4_PATHWISE_TAIL_DIAGNOSTICS_REPORT.json"}, {"name": "Full path-wise copula re-aggregation - per-driver composition transform (Phase 26 Task 2)", "verdict": "PASS", "evidence": "per-scenario composition on the FROZEN t(2.9451) copula, relief on the cuttable component only with the per-scenario envelope clip: component-basis SCR 39975.7 vs re-anchored 39794.3 = +0.46% (statistically real but immaterial); governed sigma/alpha/benefit-share UNCHANGED; copula FROZEN (df 2.9451, rho max|diff| 7.2e-16)", "source": "docs/validation/PHASE26_TASK2_COMPOSITION_TRANSFORM_REPORT.json"}, {"name": "Full path-wise copula re-aggregation - frozen-copula margin bootstrap + gap decomposition (Phase 26 Task 3)", "verdict": "PASS", "evidence": "component-basis frozen-copula bootstrap (200x20k): t SCR mean 39595.1, 95% CI [36676, 42943], SE 4.07% of mean (<= 5%); nested path-wise 46638.9 OUTSIDE the CI -> residual 14.29% gap decomposed 91.9% COPULA-FORM (heavier nested joint tail than the frozen t copula on standalone margins) / 8.1% relief-surface; copula-form DOMINANT, DISCLOSED", "source": "docs/validation/PHASE26_TASK3_MARGIN_BOOTSTRAP_REPORT.json"}, {"name": "Full path-wise copula re-aggregation - paired full-vs-reanchored delta matrix (Phase 26 Task 4)", "verdict": "PASS", "evidence": "paired common-random-number delta matrix over the Task 3 replicates: composition correction (full minus re-anchored, t) +211.5 [46.1, 381.8], 95% CI EXCLUDES zero (statistically significant) yet max |move| 0.55% < 1% MR trigger -> MR-010/MR-014 numeric refresh NOT required, MR-015 stays free; rank invariance re-verified (df/rho frozen)", "source": "docs/validation/PHASE26_TASK4_DELTA_MATRIX_REPORT.json"}]}</script>
<script>
"use strict";
(function(){
  function parseEmbedded(){
    var el = document.getElementById("ui-data");
    if(!el) return null;
    var raw = el.textContent || "";
    raw = raw.replace("/*__UI_DATA__*/","").trim();
    if(!raw || raw === "null") return null;
    try { return JSON.parse(raw); } catch(e){ return null; }
  }
  var DATA = parseEmbedded();

  function esc(s){ return String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function num(x,d){ if(x==null||isNaN(x)) return "--";
    return Number(x).toLocaleString(undefined,{maximumFractionDigits:(d==null?0:d)}); }
  function chipClass(s){ s=String(s||"").toUpperCase();
    if(/PASS|CLEAR|MITIGAT|APPROV|OK/.test(s)) return "pass";
    if(/WARN|REVIEW|PLACEHOLD|OPEN|DRAFT/.test(s)) return "warn";
    if(/FAIL|BLOCK|FALSE/.test(s)) return "fail"; return ""; }
  function chip(s){ return '<span class="chip '+chipClass(s)+'">'+esc(s||"--")+'</span>'; }

  var TABS = [
    ["overview","Overview"],
    ["inventory","Inventory & Contract"],
    ["calibrations","Calibrations"],
    ["capital","Capital & Tail"],
    ["actions","Management Actions"],
    ["phase24","Joint Actions (P24)"],
    ["phase25","Path-wise Actions (P25)"],
    ["phase26","Full Re-Agg (P26)"],
    ["phase27","Skew-t Tail (P27)"],
    ["phase28","Grouped-t Tail (P28)"],
    ["phase29","Vine Tail (P29)"],
    ["governance","Governance"]
  ];

  function renderTabs(){
    var t = document.getElementById("tabs");
    t.innerHTML = "";
    t.setAttribute("role","tablist");
    t.setAttribute("aria-label","Result sections");
    TABS.forEach(function(p,i){
      var b = document.createElement("button");
      b.type = "button";
      b.className = "tab"+(i===0?" active":"");
      b.textContent = p[1];
      b.id = "tab-"+p[0];
      b.setAttribute("data-target",p[0]);
      b.setAttribute("role","tab");
      b.setAttribute("aria-controls",p[0]);
      b.setAttribute("aria-selected", i===0?"true":"false");
      b.setAttribute("tabindex", i===0?"0":"-1");
      b.onclick = function(){ activateTab(p[0]); };
      b.addEventListener("keydown", function(e){
        if(e.key==="ArrowRight"||e.key==="ArrowLeft"||e.key==="Home"||e.key==="End"){
          e.preventDefault();
          var els=[].slice.call(document.querySelectorAll("#tabs .tab"));
          var idx=els.indexOf(b);
          var ni=e.key==="ArrowRight"?(idx+1)%els.length:e.key==="ArrowLeft"?(idx-1+els.length)%els.length:e.key==="Home"?0:els.length-1;

  // ---- inline-SVG chart toolkit (UI Task 2; zero-dependency, offline) ----
  function fmtK(x){ if(x==null||isNaN(x)) return "--"; var a=Math.abs(x);
    if(a>=1e6) return (x/1e6).toFixed(2)+"M"; if(a>=1e3) return (x/1e3).toFixed(1)+"k";
    return Number(x).toFixed(a<10&&a>0?1:0); }
  function ta(s){ return String(s==null?"":s).replace(/"/g,"&quot;"); }
  function svgOpen(w,h){ return '<svg class="chart" viewBox="0 0 '+w+' '+h+'" '+
    'preserveAspectRatio="xMidYMid meet" role="img">'; }
  function xlabel(label,cx,cy){ var w=String(label).split(" "); var o="";
    for(var i=0;i<w.length;i++){ o+='<text x="'+cx+'" y="'+(cy+i*12)+'" text-anchor="middle">'+esc(w[i])+'</text>'; }
    return o; }
  function legendRow(items){ return '<div class="legend">'+items.map(function(d){
    return '<span><i style="background:'+(d.color||'var(--accent)')+'"></i>'+esc(d.label)+'</span>'; }).join("")+'</div>'; }

  function barChart(items,opts){
    opts=opts||{};
    var W=opts.w||660, H=opts.h||300, mL=50, mR=16, mT=16, mB=opts.mB||48;
    var iw=W-mL-mR, ih=H-mT-mB;
    var vals=items.map(function(d){return d.value||0;});
    (opts.reflines||[]).forEach(function(r){ vals.push(r.value||0); });
    var maxV=opts.max!=null?opts.max:Math.max.apply(null,vals); maxV=(maxV>0?maxV:1)*1.10;
    var n=items.length, step=iw/n, bw=step*0.62;
    var Y=function(v){ return mT+ih-(v/maxV)*ih; };
    var s=svgOpen(W,H);
    for(var g=0;g<=4;g++){ var gv=maxV*g/4, gy=Y(gv);
      s+='<line class="grid" x1="'+mL+'" y1="'+gy+'" x2="'+(W-mR)+'" y2="'+gy+'"/>';
      s+='<text x="'+(mL-6)+'" y="'+(gy+3)+'" text-anchor="end">'+fmtK(gv)+'</text>'; }
    s+='<line class="axis" x1="'+mL+'" y1="'+(mT+ih)+'" x2="'+(W-mR)+'" y2="'+(mT+ih)+'"/>';
    items.forEach(function(d,i){
      var x=mL+i*step+(step-bw)/2, by=Y(d.value||0), bh=mT+ih-by;
      s+='<rect class="bar" x="'+x+'" y="'+by+'" width="'+bw+'" height="'+Math.max(0,bh)+'" rx="3" '+
        'fill="'+(d.color||'var(--accent)')+'"'+(d.stroke?(' stroke="'+d.stroke+'" stroke-width="2"'):'')+
        ' data-tip="'+ta(d.tip||(d.label+': '+num(d.value)))+'"/>';
      s+='<text class="val" x="'+(x+bw/2)+'" y="'+(by-5)+'" text-anchor="middle">'+fmtK(d.value)+'</text>';
      s+=xlabel(d.label, x+bw/2, mT+ih+14);
    });
    (opts.reflines||[]).forEach(function(r){ var ry=Y(r.value);
      s+='<line class="refline" x1="'+mL+'" y1="'+ry+'" x2="'+(W-mR)+'" y2="'+ry+'" '+
        'stroke="'+(r.color||'var(--ink)')+'" stroke-dasharray="6 4" data-tip="'+ta(r.tip||r.label)+'"/>';
      s+='<text x="'+(W-mR)+'" y="'+(ry-4)+'" text-anchor="end" fill="'+(r.color||'var(--ink)')+'">'+esc(r.label)+'</text>';
    });
    return s+'</svg>';
  }

  function ciChart(rows,opts){
    opts=opts||{};
    var W=opts.w||680, rowH=70, mT=14, mB=30, mL=86, mR=28;
    var H=mT+mB+rows.length*rowH;
    var av=[]; rows.forEach(function(r){ av.push(r.lo,r.hi,r.point); });
    var lo=Math.min.apply(null,av), hi=Math.max.apply(null,av);
    var pad=(hi-lo)*0.18||1; lo-=pad; hi+=pad;
    var X=function(v){ return mL+(v-lo)/(hi-lo)*(W-mL-mR); };
    var s=svgOpen(W,H);
    for(var t=0;t<=4;t++){ var tv=lo+(hi-lo)*t/4, tx=X(tv);
      s+='<line class="grid" x1="'+tx+'" y1="'+mT+'" x2="'+tx+'" y2="'+(H-mB)+'"/>';
      s+='<text x="'+tx+'" y="'+(H-mB+16)+'" text-anchor="middle">'+fmtK(tv)+'</text>'; }
    rows.forEach(function(r,i){
      var cy=mT+i*rowH+rowH/2, c=r.color||'var(--accent)';
      s+='<text class="val" x="'+(mL-12)+'" y="'+(cy-3)+'" text-anchor="end">'+esc(r.label)+'</text>';
      s+='<text x="'+(mL-12)+'" y="'+(cy+13)+'" text-anchor="end">'+fmtK(r.point)+'</text>';
      var x1=X(r.lo), x2=X(r.hi), xp=X(r.point);
      s+='<line x1="'+x1+'" y1="'+cy+'" x2="'+x2+'" y2="'+cy+'" stroke="'+c+'" stroke-width="3" data-tip="'+ta(r.tip)+'"/>';
      s+='<line x1="'+x1+'" y1="'+(cy-8)+'" x2="'+x1+'" y2="'+(cy+8)+'" stroke="'+c+'" stroke-width="2"/>';
      s+='<line x1="'+x2+'" y1="'+(cy-8)+'" x2="'+x2+'" y2="'+(cy+8)+'" stroke="'+c+'" stroke-width="2"/>';
      s+='<circle cx="'+xp+'" cy="'+cy+'" r="6" fill="var(--ink)" stroke="'+c+'" stroke-width="2" data-tip="'+ta(r.tip)+'"/>';
    });
    return s+'</svg>';
  }

  function lineChart(series,xvals,opts){
    opts=opts||{};
    var W=opts.w||680, H=opts.h||300, mL=58, mR=20, mT=18, mB=44;
    var iw=W-mL-mR, ih=H-mT-mB;
    var allY=[]; series.forEach(function(se){ allY=allY.concat(se.data); });
    var minY=Math.min.apply(null,allY), maxY=Math.max.apply(null,allY);
    var pad=(maxY-minY)*0.15||1; minY-=pad; maxY+=pad;
    var xmin=Math.min.apply(null,xvals), xmax=Math.max.apply(null,xvals);
    var X=function(v){ return mL+(xmax===xmin?0:(v-xmin)/(xmax-xmin)*iw); };
    var Y=function(v){ return mT+ih-(v-minY)/(maxY-minY)*ih; };
    var s=svgOpen(W,H);
    for(var g=0;g<=4;g++){ var gv=minY+(maxY-minY)*g/4, gy=Y(gv);
      s+='<line class="grid" x1="'+mL+'" y1="'+gy+'" x2="'+(W-mR)+'" y2="'+gy+'"/>';
      s+='<text x="'+(mL-6)+'" y="'+(gy+3)+'" text-anchor="end">'+fmtK(gv)+'</text>'; }
    s+='<line class="axis" x1="'+mL+'" y1="'+(mT+ih)+'" x2="'+(W-mR)+'" y2="'+(mT+ih)+'"/>';
    xvals.forEach(function(xv){ var px=X(xv);
      s+='<text x="'+px+'" y="'+(mT+ih+16)+'" text-anchor="middle">'+fmtK(xv)+'</text>'; });
    if(opts.markX!=null){ var mx=X(opts.markX);
      s+='<line class="refline" x1="'+mx+'" y1="'+mT+'" x2="'+mx+'" y2="'+(mT+ih)+'" '+
        'stroke="var(--warn)" stroke-dasharray="5 4" data-tip="'+ta("Recommended outer count n* = "+num(opts.markX))+'"/>';
      s+='<text x="'+mx+'" y="'+(mT-4)+'" text-anchor="middle" fill="var(--warn)">n*='+fmtK(opts.markX)+'</text>'; }
    series.forEach(function(se){
      var d=""; se.data.forEach(function(v,i){ d+=(i?"L":"M")+X(xvals[i])+" "+Y(v)+" "; });
      s+='<path d="'+d+'" fill="none" stroke="'+se.color+'" stroke-width="2.2"/>';
      se.data.forEach(function(v,i){
        s+='<circle cx="'+X(xvals[i])+'" cy="'+Y(v)+'" r="4.5" fill="'+se.color+'" data-tip="'+
          ta("<b>"+se.label+"</b><br>n_outer = "+num(xvals[i])+"<br>"+se.label+" = "+num(v))+'"/>'; });
    });
    return s+'</svg>';
  }

  function wireTips(container){
    var tip=document.getElementById("__tip");
    if(!tip){ tip=document.createElement("div"); tip.id="__tip"; tip.className="tipbox"; document.body.appendChild(tip); }
    container.addEventListener("mousemove",function(e){
      var t=(e.target&&e.target.getAttribute)?e.target.getAttribute("data-tip"):null;
      if(t){ tip.innerHTML=t; tip.classList.add("on");
        tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY+16)+"px";
      } else { tip.classList.remove("on"); }
    });
    container.addEventListener("mouseleave",function(){ tip.classList.remove("on"); });
  }

  function capAggBlock(cap){
    var cop=cap.copula||{}, cands=cop.candidates||[], nested=cap.nested_scr, sel=cap.selected_copula;
    var D=[
      {label:"Standalone sum", value:cap.standalone_sum, color:"#5a6b7d",
        tip:"<b>Standalone sum</b><br>Naive add-up (no diversification): "+num(cap.standalone_sum)},
      {label:"Var-covar", value:cap.var_covar_scr, color:"#ffb454",
        tip:"<b>Var-covar (formula)</b><br>SCR: "+num(cap.var_covar_scr)+
          "<br>Rel err vs nested: "+(cap.formula_vs_nested_rel_error!=null?(cap.formula_vs_nested_rel_error*100).toFixed(1)+"%":"--")+
          "<br>Gaussian-correlation closed form; understates the tail."}
    ];
    cands.forEach(function(c){
      var is=(c.name===sel);
      D.push({label:String(c.name).replace(/_/g,"-"), value:c.aggregated_scr,
        color:is?"#4f9cff":"#33506e", stroke:is?"var(--ink)":null,
        tip:"<b>"+c.name+(is?" (selected)":"")+"</b><br>Aggregated SCR: "+num(c.aggregated_scr)+
          "<br>Rel err vs nested: "+(c.scr_rel_error_vs_nested*100).toFixed(1)+"%"+
          "<br>Diversification benefit: "+num(c.diversification_benefit)+
          "<br>Upper-tail dependence: "+Number(c.upper_tail_dependence).toFixed(3)+
          "<br>AIC: "+Number(c.aic).toFixed(1)});
    });
    var reflines=(nested!=null)?[{label:"Nested benchmark", value:nested, color:"var(--pass)",
      tip:"<b>Nested-simulation benchmark</b><br>SCR: "+num(nested)+"<br>The capital figure all aggregators are judged against."}]:[];
    var note="";
    if(cap.esg_understatement_pct!=null)
      note='<p class="cap" style="margin-top:8px">Var-covar understates the nested benchmark by <b>'+
        esc(cap.esg_understatement_pct)+'%</b> (MR-010). Selected aggregator: '+chip(sel||"--")+
        ' &mdash; closest match to nested with parsimony (lowest AIC among adequate fits).</p>';
    return '<div class="chartwrap"><h4>Capital aggregation: standalone &rarr; var-covar &rarr; copula vs nested</h4>'+
      '<p class="cap">Each aggregation method versus the nested-simulation benchmark (dashed green). '+

  // ---- Governance & assumptions view (UI Task 4) ----
  var GLIK=["VERY_LOW","LOW","MEDIUM","HIGH","CRITICAL"];
  var GIMP=["VERY_LOW","LOW","MEDIUM","HIGH","CRITICAL"];
  function gLvl(s){ s=String(s||"").toUpperCase().replace(/\s+/g,"_");
    var m={VERY_LOW:0,VL:0,LOW:1,L:1,MEDIUM:2,MODERATE:2,MED:2,M:2,HIGH:3,H:3,CRITICAL:4,VERY_HIGH:4,SEVERE:4};
    return (m[s]!=null)?m[s]:-1; }

  function govIntegrity(g){
    var ae=(typeof g.audit_entries==="number")?g.audit_entries:((g.audit_entries||[]).length||0);
    var ver=(g.audit_verified!=null)?g.audit_verified:ae;
    var fail=(g.audit_failed!=null)?g.audit_failed:0;
    var steps=0; (g.change_records||[]).forEach(function(c){ steps+=(c.sign_off_history||[]).length; });
    var ok=(fail===0)&&(ver===ae)&&(g.audit_integrity_ok!==false);
    return {ok:ok,entries:ae,verified:ver,failed:fail,signoff_steps:steps,records:(g.change_records||[]).length};
  }

  function govKpis(g){
    var gates=g.deployment_gates||[], cleared=gates.filter(function(x){return x.cleared;}).length;

    var mitR=risks.filter(function(r){ return rs(r)==="MITIGATED"||rs(r)==="CLOSED"; }).length;

  function riskHeatmap(risks){
    var W=440,H=300,mL=92,mT=12,mB=60,mR=14;
    var cols=5,rows=5,cw=(W-mL-mR)/cols,ch=(H-mT-mB)/rows;
    var grid={}; risks.forEach(function(r){ var li=gLvl(r.likelihood),ii=gLvl(r.impact);
      if(li<0||ii<0) return; var k=ii+'_'+li; grid[k]=(grid[k]||0)+1; });
    var s=svgOpen(W,H);
    for(var ri=0;ri<rows;ri++){ var imp=rows-1-ri;
      for(var ci=0;ci<cols;ci++){
        var x=mL+ci*cw, y=mT+ri*ch, n=grid[imp+'_'+ci]||0, score=imp+ci;
        var col=score>=6?'rgba(255,107,107,':(score>=4?'rgba(255,180,84,':(score>=2?'rgba(79,156,255,':'rgba(57,217,138,'));
        s+='<rect x="'+x+'" y="'+y+'" width="'+(cw-3)+'" height="'+(ch-3)+'" rx="4" fill="'+col+(n>0?'0.85':'0.12')+')" '+
          'stroke="var(--line)" data-tip="'+ta('Impact '+GIMP[imp].replace('_',' ')+' × Likelihood '+GLIK[ci].replace('_',' ')+'<br>'+n+' risk(s)')+'"/>';
        if(n>0) s+='<text class="val" x="'+(x+(cw-3)/2)+'" y="'+(y+(ch-3)/2+4)+'" text-anchor="middle">'+n+'</text>';
      }
    }
    for(var c2=0;c2<cols;c2++){ s+=xlabel(GLIK[c2].replace('_',' '), mL+c2*cw+(cw-3)/2, mT+rows*ch+12); }
    for(var r2=0;r2<rows;r2++){ var imp2=rows-1-r2;
      s+='<text x="'+(mL-8)+'" y="'+(mT+r2*ch+(ch-3)/2+3)+'" text-anchor="end">'+esc(GIMP[imp2].replace('_',' '))+'</text>'; }
    s+='<text x="'+(mL+(W-mL-mR)/2)+'" y="'+(H-4)+'" text-anchor="middle">Likelihood &rarr;</text>';
    return s+'</svg>';
  }

  function downloadBlob(name,blob){
    try{
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a"); a.href=url; a.download=name;
      document.body.appendChild(a); a.click();
      setTimeout(function(){ try{URL.revokeObjectURL(url);}catch(e){} if(a.parentNode) a.parentNode.removeChild(a); },0);
    }catch(e){}
  }
  function downloadText(name,text,mime){ downloadBlob(name,new Blob([text],{type:(mime||"text/plain")+";charset=utf-8"})); }
  function csvCell(v){ v=(v==null?"":String(v)).replace(/\r?\n/g," "); if(/[",]/.test(v)) v='"'+v.replace(/"/g,'""')+'"'; return v; }
  function rowsToCSV(headers,rows){ var out=[headers.map(csvCell).join(",")]; rows.forEach(function(r){ out.push(r.map(csvCell).join(",")); }); return out.join("\r\n"); }
  function buildInventoryCSV(){ var inv=(DATA&&DATA.inventory)||[];
    return rowsToCSV(["id","category","headline","bytes","sha256","path","mtime_utc"],
      inv.map(function(i){ return [i.id,i.category,i.headline,i.bytes,i.sha256,i.path,i.mtime_utc]; })); }
  function buildRiskCSV(){ var rr=(DATA&&DATA.governance&&DATA.governance.risk_register)||[];
    return rowsToCSV(["risk_id","title","overall_rating","mitigation_status","category","likelihood","impact","owner","related_standard","updated_at","description","mitigation"],
      rr.map(function(r){ return [r.risk_id,r.title,r.overall_rating,r.mitigation_status,r.category,r.likelihood,r.impact,r.owner,r.related_standard,r.updated_at,r.description,r.mitigation]; })); }
  function buildChangesCSV(){ var cr=(DATA&&DATA.governance&&DATA.governance.change_records)||[];
    return rowsToCSV(["record_id","title","status","change_type","phase","author","peer_reviewer","created_at","standard_references","signoff_steps"],
      cr.map(function(c){ return [c.record_id,c.title,c.status,c.change_type,c.phase,c.author,c.peer_reviewer,c.created_at,(c.standard_references||[]).join("; "),(c.sign_off_history||[]).length]; })); }
  window.__uiExport={ inventoryCSV:buildInventoryCSV, riskCSV:buildRiskCSV, changesCSV:buildChangesCSV };
  function isVisible(el){ return !!(el&&(el.offsetWidth||el.offsetHeight||(el.getClientRects&&el.getClientRects().length))); }
  function dataURLtoBlob(du){ var p=du.split(","),b=atob(p[1]),n=b.length,u=new Uint8Array(n); while(n--) u[n]=b.charCodeAt(n); return new Blob([u],{type:"image/png"}); }
  function svgToPng(svg,filename){
    try{
      var SVGNS="http"+"://www.w3.org/2000/svg";
      var clone=svg.cloneNode(true); clone.setAttribute("xmlns",SVGNS);
      var vb=(svg.getAttribute("viewBox")||"0 0 660 300").split(/\s+/);
      var w=parseFloat(vb[2])||660, h=parseFloat(vb[3])||300, scale=2;
      clone.setAttribute("width",w); clone.setAttribute("height",h);
      var st=document.createElementNS(SVGNS,"style"); st.textContent=CHART_EXPORT_CSS;
      var bg=document.createElementNS(SVGNS,"rect");
      bg.setAttribute("x",0); bg.setAttribute("y",0); bg.setAttribute("width",w); bg.setAttribute("height",h); bg.setAttribute("fill","#1d2733");
      clone.insertBefore(bg,clone.firstChild); clone.insertBefore(st,clone.firstChild);
      var xml=new XMLSerializer().serializeToString(clone);
      var url="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(xml)));
      var img=new Image();
      img.onload=function(){
        var cv=document.createElement("canvas"); cv.width=w*scale; cv.height=h*scale;
        var ctx=cv.getContext("2d"); ctx.scale(scale,scale); ctx.drawImage(img,0,0);
        if(cv.toBlob){ cv.toBlob(function(bl){ if(bl) downloadBlob(filename,bl); },"image/png"); }
        else { downloadBlob(filename,dataURLtoBlob(cv.toDataURL("image/png"))); }
      };
      img.onerror=function(){};
      img.src=url;
    }catch(e){}
  }
  function exportPNGActive(){
    var panel=document.querySelector(".panel.active"); if(!panel) return;
    var pid=panel.id||"panel";
    var svgs=[].slice.call(panel.querySelectorAll("svg.chart")).filter(isVisible);
    if(!svgs.length){ try{ alert("No charts on the active tab. Open Capital & Tail, Calibrations, or Governance to export charts."); }catch(e){} return; }
    svgs.forEach(function(svg,i){ svgToPng(svg,"chart_"+pid+"_"+(i+1)+".png"); });
  }
  function wireToolbar(){
    var map=[
      ["btnExportPng",function(){ exportPNGActive(); }],
      ["btnCsvInv",function(){ downloadText("inventory.csv",buildInventoryCSV(),"text/csv"); }],
      ["btnCsvRisk",function(){ downloadText("risk_register.csv",buildRiskCSV(),"text/csv"); }],
      ["btnCsvChg",function(){ downloadText("change_records.csv",buildChangesCSV(),"text/csv"); }],
      ["btnPrint",function(){ try{ window.print(); }catch(e){} }]
    ];
    map.forEach(function(m){ var b=document.getElementById(m[0]); if(b) b.onclick=m[1]; });
  }
  function a11yEnhance(){
    [].forEach.call(document.querySelectorAll(".subnav"),function(nav){
      nav.setAttribute("role","tablist");
      var btns=[].slice.call(nav.querySelectorAll(".segbtn"));
      btns.forEach(function(b,i){
        b.setAttribute("role","tab");
        b.setAttribute("aria-selected", b.classList.contains("active")?"true":"false");
        if(!b.hasAttribute("tabindex")) b.setAttribute("tabindex", b.classList.contains("active")?"0":"-1");
        b.addEventListener("keydown",function(e){
          if(e.key==="Enter"||e.key===" "||e.key==="Spacebar"){ e.preventDefault(); b.click(); }
          else if(e.key==="ArrowRight"||e.key==="ArrowLeft"||e.key==="Home"||e.key==="End"){
            e.preventDefault();
            var ni=e.key==="ArrowRight"?(i+1)%btns.length:e.key==="ArrowLeft"?(i-1+btns.length)%btns.length:e.key==="Home"?0:btns.length-1;
            btns[ni].focus(); btns[ni].click();
          }
        });
      });
    });
    var lbl={invq:"Filter inventory by name or headline",invcat:"Filter inventory by category",rfRating:"Filter risks by overall rating",rfStatus:"Filter risks by mitigation status"};
    Object.keys(lbl).forEach(function(id){ var el=document.getElementById(id); if(el&&!el.getAttribute("aria-label")) el.setAttribute("aria-label",lbl[id]); });
    [].forEach.call(document.querySelectorAll(".filter input,.filter select"),function(el){ if(!el.getAttribute("aria-label")) el.setAttribute("aria-label", el.id||"filter control"); });
    [].forEach.call(document.querySelectorAll(".rrow,.crow"),function(el){ if(!el.hasAttribute("tabindex")){ el.setAttribute("tabindex","0"); el.setAttribute("role","button"); } });
  }
  var _a11yWired=false;
  function wireGlobalA11y(){
    if(_a11yWired) return; _a11yWired=true;
    document.addEventListener("click",function(e){
      var t=e.target;
      if(t&&t.classList&&t.classList.contains("segbtn")){
        var nav=t.closest?t.closest(".subnav"):null;
        if(nav){ [].forEach.call(nav.querySelectorAll(".segbtn"),function(b){
          var on=b.classList.contains("active");
          b.setAttribute("aria-selected", on?"true":"false");
          b.setAttribute("tabindex", on?"0":"-1");
        }); }
      }
    });
    document.addEventListener("keydown",function(e){
      var t=e.target; if(!t||!t.classList) return;
      if((e.key==="Enter"||e.key===" "||e.key==="Spacebar")&&(t.classList.contains("rrow")||t.classList.contains("crow"))){ e.preventDefault(); t.click(); }
    });
  }
  function renderAll(){
    renderHeader(); renderOverview(); renderInventory();
    renderCalibrations(); renderCapital(); renderActions(); renderPhase24(); renderPhase25(); renderPhase26(); renderPhase27(); renderPhase28(); renderPhase29(); renderGovernance(); wireDropLoader();
    wireToolbar(); a11yEnhance(); wireGlobalA11y();
  }

  renderTabs();
  renderAll();
})();
</script>
