<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Actuarial Stochastic Model -- Offline Result UI</title>
<style>
  :root{
    --bg:#0f141b; --panel:#161e29; --panel2:#1d2733; --ink:#e7edf5; --muted:#93a1b3;
    --line:#283545; --accent:#4f9cff; --pass:#39d98a; --warn:#ffb454; --fail:#ff6b6b;
    --chip:#22303f;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{padding:18px 22px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#16202c,#0f141b)}
  h1{margin:0 0 4px;font-size:19px;font-weight:650}
  .sub{color:var(--muted);font-size:12.5px}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;margin:14px 0 0}
  .tab{padding:8px 14px;border:1px solid var(--line);border-bottom:none;
    background:var(--panel);color:var(--muted);border-radius:8px 8px 0 0;cursor:pointer;font-size:13px}
  .tab.active{background:var(--panel2);color:var(--ink);font-weight:600}
  .panel{display:none;background:var(--panel2);border:1px solid var(--line);
    border-radius:0 8px 8px 8px;padding:18px;margin-bottom:30px}
  .panel.active{display:block}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:6px 0 16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .card .k{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em}
  .card .v{font-size:20px;font-weight:650;margin-top:3px}
  table{border-collapse:collapse;width:100%;font-size:13px}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;
    position:sticky;top:0;background:var(--panel2)}
  tr:hover td{background:#1a2531}
  .chip{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11.5px;font-weight:600;
    background:var(--chip);border:1px solid var(--line)}
  .chip.pass{color:var(--pass);border-color:#1f5e44}
  .chip.warn{color:var(--warn);border-color:#5e4a1f}
  .chip.fail{color:var(--fail);border-color:#5e2222}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;color:var(--muted)}
  .gate-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:6px}
  .gate{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .gate h4{margin:0 0 2px;font-size:14px}
  .gate .params{margin-top:8px;font-size:12.5px;color:var(--muted)}
  .gate .params b{color:var(--ink);font-weight:600}
  .critgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:6px;margin:4px 0 14px}
  .crit{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);
    border-radius:7px;padding:6px 10px;font-size:12.5px}
  .crit .cic{font-weight:700;width:14px;text-align:center}
  .crit.pass .cic{color:var(--pass)} .crit.fail .cic{color:var(--fail)}
  .subh{margin:12px 0 6px;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .ptable{margin-bottom:14px}
  .calibpanel{padding:14px 16px}
  .calibpanel h4{margin:0 0 2px;font-size:14.5px}
  .filter{margin:2px 0 12px}
  .filter input,.filter select{background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:7px;padding:6px 9px;font-size:13px}
  .muted{color:var(--muted)}
  .note{color:var(--muted);font-size:12.5px;margin-top:10px}
  details{margin-top:12px}
  summary{cursor:pointer;color:var(--accent);font-size:13px}
  pre{background:#0c1118;border:1px solid var(--line);border-radius:8px;padding:12px;overflow:auto;
    font-size:11.5px;color:#cbd6e4}
  .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:var(--chip);
    border:1px solid var(--line);color:var(--muted);margin-left:6px}
  .scaffold{color:var(--muted);font-size:13px;padding:8px 0}
  .dz{margin-top:14px;border:1px dashed var(--line);border-radius:10px;padding:14px;color:var(--muted);font-size:12.5px}
  .subnav{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 14px}
  .segbtn{padding:6px 12px;border:1px solid var(--line);background:var(--panel);color:var(--muted);
    border-radius:7px;cursor:pointer;font-size:12.5px}
  .segbtn.active{background:var(--accent);border-color:var(--accent);color:#06101c;font-weight:650}
  .chartwrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 14px 10px;margin-bottom:14px}
  .chartwrap h4{margin:0 0 2px;font-size:14px}
  .chartwrap .cap{color:var(--muted);font-size:12px;margin:0 0 10px}
  svg.chart{display:block;width:100%;height:auto;overflow:visible;margin-top:2px}
  svg.chart text{fill:var(--muted);font:11px -apple-system,Segoe UI,Roboto,sans-serif}
  svg.chart text.val{fill:var(--ink);font-weight:600}
  svg.chart .axis{stroke:var(--line);stroke-width:1}
  svg.chart .grid{stroke:#22303f;stroke-width:1;stroke-dasharray:3 3}
  svg.chart .bar{transition:opacity .12s}
  svg.chart .bar:hover,svg.chart circle:hover{opacity:.82;cursor:pointer}
  svg.chart .refline{stroke-width:1.5}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:8px 2px 0;font-size:12px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .tipbox{position:fixed;z-index:50;pointer-events:none;background:#0c1118;border:1px solid var(--line);
    border-radius:7px;padding:7px 9px;font-size:12px;color:var(--ink);max-width:280px;line-height:1.45;
    box-shadow:0 6px 20px rgba(0,0,0,.45);opacity:0;transition:opacity .08s}
  .tipbox.on{opacity:1}
  .gbar{height:9px;background:var(--panel);border:1px solid var(--line);border-radius:999px;overflow:hidden;margin:4px 0 12px}
  .gbar-fill{height:100%;background:var(--pass)}
  .timeline{position:relative;margin-top:6px}
  .tl-item{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
  .tl-dot{width:11px;height:11px;border-radius:50%;margin-top:5px;flex:0 0 auto;background:var(--muted)}
  .tl-dot.pass{background:var(--pass)} .tl-dot.warn{background:var(--warn)} .tl-dot.fail{background:var(--fail)}
  .tl-body{flex:1 1 auto;min-width:0}
  .tl-head{margin-bottom:2px}
  .tl-soh{padding:6px 0 6px 10px;border-left:2px solid var(--line);margin:5px 0}
  .rdetbox{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12.5px}
  .heatwrap{max-width:460px;margin:0 0 10px}
  .auditbadge{display:inline-block;padding:8px 14px;border-radius:8px;font-weight:700;font-size:13px}
  .auditbadge.ok{color:var(--pass);background:rgba(57,217,138,.12);border:1px solid #1f5e44}
  .auditbadge.bad{color:var(--fail);background:rgba(255,107,107,.12);border:1px solid #5e2222}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .tbtn{padding:6px 12px;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:7px;cursor:pointer;font-size:12.5px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .tab,.segbtn{font-family:inherit}
  /* Phase 35 Task 2 (gap A1): CSS-only :focus-visible on EVERY interactive control type (WCAG 2.1 AA 2.4.7 focus visible / 2.1.1 keyboard). */
  .tab:focus-visible,.tbtn:focus-visible,.segbtn:focus-visible,.rrow:focus-visible,.crow:focus-visible,.panel:focus-visible,.hctoggle:focus-visible,a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,summary:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  /* Phase 33 Task 5 (gap G4): visually-hidden table captions for screen readers
     (kept off-screen; no layout or rendered-figure impact). */
  .sr-only{position:absolute !important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .integritybanner{margin:10px 0 14px;padding:10px 14px;border:1px solid var(--warn);border-radius:8px;background:rgba(94,74,31,0.12);color:var(--ink);font-size:13px;line-height:1.5}
  .integritybanner .ibannerlabel{font-weight:700;color:var(--warn);margin-right:6px;text-transform:uppercase;letter-spacing:.03em;font-size:11.5px}
  .signoffcover{display:none}
  /* Phase 34 Task 3 (gap H2): global cross-tab search + deep-linkable read-outs.
     DISPLAY LAYER ONLY -- the search index is built from text ALREADY rendered in
     the artifact (tab titles, table captions, headline labels). A match scrolls to
     and flashes its element WITHOUT mutating the element's text, so the governed
     headline is never re-labelled. No storage APIs; file:// safe. */
  .gsearch{position:relative;margin:14px 0 0;max-width:560px}
  .gsearch-input{width:100%;box-sizing:border-box;background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit}
  .gsearch-input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .gsearch-results{position:absolute;z-index:60;left:0;right:0;margin-top:4px;background:var(--panel);border:1px solid var(--line);border-radius:8px;max-height:340px;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,.45)}
  .gsearch-item{padding:8px 12px;border-bottom:1px solid var(--line);cursor:pointer;font-size:12.5px;color:var(--ink)}
  .gsearch-item:last-child{border-bottom:none}
  .gsearch-item.active,.gsearch-item:hover{background:var(--panel2)}
  .gsearch-item .gs-where{display:block;color:var(--muted);font-size:11px;margin-top:2px;text-transform:uppercase;letter-spacing:.03em}
  .gsearch-empty{padding:8px 12px;color:var(--muted);font-size:12.5px}
  .dl-flash{animation:dlflash 1.6s ease-out 1;border-radius:8px}
  @keyframes dlflash{0%{box-shadow:0 0 0 3px var(--accent);background:rgba(79,156,255,.18)}100%{box-shadow:0 0 0 0 rgba(79,156,255,0);background:transparent}}
  @media print{
    :root{--bg:#fff;--panel:#fff;--panel2:#fff;--ink:#111;--muted:#444;--line:#bbb;--chip:#eee;--accent:#15489c}
    body{background:#fff;color:#111}
    header{background:#fff;border-color:#bbb}
    .toolbar,.tabs,.dz,.filter,.gsearch,#__tip,details>summary{display:none !important}
    .panel{display:block !important;border:none;border-radius:0;padding:0;margin:0 0 22px;background:#fff}
    .panel::before{display:block;content:attr(data-title);font-size:16px;font-weight:700;margin:0 0 10px;color:#111;border-bottom:2px solid #111;padding-bottom:4px}
    .chartwrap,.gate,.card,table,.tl-item{page-break-inside:avoid}
    svg.chart text{fill:#111} svg.chart text.val{fill:#000}
    .card,.gate,.chartwrap{border-color:#bbb}
    a{color:#111}
    .signoffcover{display:block !important;page-break-after:always;margin:0 0 18px}
    .signoffcover h2{font-size:20px;margin:0 0 6px;color:#111;border-bottom:2px solid #111;padding-bottom:4px}
    .signoffcover .sigmeta{font-size:12.5px;color:#222;margin:2px 0}
    .signoffcover .signeutral{margin:10px 0;padding:8px;border:1px solid #888;font-size:12px;color:#111}
    .signoffcover .sigrow{display:flex;gap:24px;margin-top:14px}
    .signoffcover .sigbox{flex:1;border-top:1px solid #111;padding-top:4px;font-size:12px;color:#111}
    /* H3 print-all: reveal every governed surface (all tab panels + collapsed sub-views) for one sign-off print */
    html.printall .panel{display:block !important}
    html.printall .calibpanel,html.printall .capview,html.printall .govview{display:block !important}
    html.printall .signoffcover{display:block !important}
  }
  /* ===== Phase 34 Task 5 (gap H4): responsive + high-contrast usability pass =====
     Markup/CSS/behaviour only. No model figure changes; no storage APIs; the
     high-contrast toggle persists via the URL hash only. ADDITIVE: the default
     wide-desktop layout and dark scheme are unchanged when no hc flag is set and
     the viewport is wide. Scheduled last so it also covers H1-H3 surfaces. */
  @media (max-width:768px){
    .wrap{padding:0 12px}
    header{padding:14px 14px}
    .cards{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
    .panel{overflow-x:auto}
    table{display:block;overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch}
    img,svg,canvas{max-width:100%}
    pre{max-width:100%;overflow-x:auto}
    .tabs{gap:3px}
    .tab{padding:7px 10px;font-size:12px}
  }
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
  }
  html.hc{--bg:#000;--panel:#000;--panel2:#000;--ink:#fff;--muted:#e6e6e6;--line:#fff;--accent:#5cf;--pass:#5f5;--warn:#ff0;--fail:#f66;--chip:#000}
  html.hc .tab{border-color:#fff}
  html.hc .tab.active{outline:2px solid #fff}
  html.hc .panel{border-color:#fff}
  html.hc a{color:#9cf}
  html.hc :focus{outline:3px solid #ff0;outline-offset:2px}
  .hctoggle{margin-top:8px;background:var(--chip);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer}
  .hctoggle:hover{border-color:var(--accent)}
  html.hc .hctoggle{border-color:#fff;background:#000;color:#fff}
</style>
</head>

"owner": "Model Developer", "likelihood": "VERY_LOW", "impact": "CRITICAL", "description": "Prior to Phase 2, the codebase did not enforce or document the distinction between real-world (P) and risk-neutral (Q) scenario sets. Mixing measures is a critical actuarial error that invalidates both VaR/ES and TVOG outputs.", "mitigation": "Measure enum implemented in esg_process.py (Phase 2). LossDistribution enforces Measure.P for VaR/ES (risk_metrics.py); TVOGEngine enforces Measure.Q (tvog.py). Phase 14 Task 1: runtime guard _enforce_simulation_measure() now validates the requested measure against each generator's declared SUPPORTED_MEASURES in every simulate()/generate() execution path (HullWhite, G2++, GBM, FX, ScenarioSet), and _assert_output_measure() verifies the output measure stamp. 30 dedicated runtime tests (tests/test_measure_enforcement.py) PASS with genuine runtime execution evidence (numpy/scipy/pandas/pytest available in automation sandbox).", "related_standard": "SOA ASOP 56 \u00a73.1.3; IA TAS M \u00a73.4", "updated_at": "2026-06-04T10:30:44+00:00"}, {"risk_id": "MR-005", "title": "Distributed executor pickling failure", "overall_rating": "HIGH", "mitigation_status": "CLOSED", "category": "process_risk", "owner": "Model Developer", "likelihood": "HIGH", "impact": "HIGH", "description": "DistributedExecutor fails to serialise complex model objects for multiprocessing, causing 7 test failures in the original repository test suite. This blocks all distributed scenario execution, TVOG computation, and VaR/ES integration.", "mitigation": "RESOLVED \u2014 module-level `_execute_task_spec` callable + `make_partial_task` binder; verified by 63 tests.", "related_standard": "SOA ASOP 56 \u00a73.5 (scenario adequacy requires successful batch execution)", "updated_at": "2026-06-04T09:16:43.834338+00:00"}, {"risk_id": "MR-006", "title": "Model validation readiness below production threshold", "overall_rating": "CRITICAL", "mitigation_status": "IN_PROGRESS", "category": "governance_risk", "owner": "Assumption Owner", "likelihood": "HIGH", "impact": "CRITICAL", "description": "Overall validation readiness assessed at 2/5 (development-grade). Stochastic validation (scenario convergence, martingale test, VaR/ES integration) is entirely absent. Model is not fit for regulatory reporting or production use in current state.", "mitigation": "4-layer validation framework implementation across Phases 3\u20134. Full validation cadence in Phase 5.", "related_standard": "SOA ASOP 56 \u00a73.5; IA TAS M \u00a73.6; APS X2", "updated_at": "2026-05-18T02:18:55.749042+00:00"}, {"risk_id": "MR-007", "title": "No assumption change control process", "overall_rating": "HIGH", "mitigation_status": "IN_PROGRESS", "category": "governance_risk", "owner": "Assumption Owner", "likelihood": "HIGH", "impact": "HIGH", "description": "The model has no documented assumption change control process. Any assumption can be changed without sign-off, impact assessment, or audit trail. This is a material IA TAS M \u00a73.7 gap.", "mitigation": "GovernanceStore + ChangeRecord + SignOffWorkflow implemented in Phase 2, Task 4 (this module). Requires organisational adoption.", "related_standard": "IA TAS M \u00a73.7; IA TAS M \u00a73.3", "updated_at": "2026-05-18T02:18:55.749049+00:00"}, {"risk_id": "MR-008", "title": "HW1F calibration not yet executed", "overall_rating": "CRITICAL", "mitigation_status": "OPEN", "category": "model_error", "owner": "Model Developer", "likelihood": "HIGH", "impact": "CRITICAL", "description": "HullWhiteCalibrator.calibrate() is a NotImplementedError stub. HW1F parameters (a=0.10, \u03c3_r=0.012) are placeholders producing model swaption vol ~250 bps vs ~42 bps market \u2014 a 6x error. All interest rate paths and ZCB prices derived from these parameters are unreliable.", "mitigation": "Implement L-BFGS-B calibration in Phase 4 using CNY swaption market data.", "related_standard": "SOA ASOP 56 \u00a73.4; SOA ASOP 25 \u00a73.3", "updated_at": "2026-05-18T02:18:55.749056+00:00"}, {"risk_id": "MR-009", "title": "Educational guided-examples wrapper drifted from model API", "overall_rating": "VERY_LOW", "mitigation_status": "CLOSED", "category": "operational_risk", "owner": "Model Developer", "likelihood": "LOW", "impact": "LOW", "description": "par_model_v2/examples/guided_examples.py references attributes removed from RiskFreeCurve (calibration_date/model_label/discount_factors) and FixedIncomeInstrument (term_months/par_value/oas_bps) and an outdated project_fixed_income_cashflows signature; tests/test_guided_examples.py errors (3 failed / 46 errors). Surfaced by the Phase 13 Task 4 IA TAS M \u00a73.6 validation run. Educational wrapper only; backs no IA TAS M \u00a73.6 requirement; production reporting engine (reporting_cycle.py) is tested separately and passes.", "mitigation": "Migrate the fixed-income / TVOG / HK-liability sections of guided_examples.py to the current APIs in a dedicated change-controlled cycle; re-run tests/test_guided_examples.py to green.", "related_standard": "IA TAS M \u00a73.6; SOA ASOP 56 \u00a73.5", "updated_at": "2026-06-04T12:37:49.737472+00:00"}, {"risk_id": "MR-010", "title": "Variance-covariance aggregation understates diversified capital", "overall_rating": "HIGH", "mitigation_status": "MITIGATED", "category": "model_error", "owner": "Model Owner", "likelihood": "MEDIUM", "impact": "HIGH", "description": "The standard-formula (variance-covariance) aggregation fed with the raw ESG rate/equity factor correlation understates the fully-diversified nested tail capital by ~33% (29,031 vs 43,251 at 99.5%). The realised capital-loss correlation is +0.55 vs the -0.15 factor correlation because the equity maturity guarantee and rate-driven guaranteed-benefit legs lose value in the same direction under joint down-rate/down-equity stress.", "mitigation": "Benchmark all aggregated figures to the multi-driver nested run; aggregate on the empirical capital-loss correlation rather than the raw ESG factor correlation; document gap in the limitation card. Educational only; not used for any capital decision.", "related_standard": "SOA ASOP 56 \u00a73.5; IA TAS M \u00a73.6; SOA ASOP 25 \u00a73.3", "updated_at": "2026-06-08T01:31:12.922427+00:00"}, {"risk_id": "MR-011", "title": "Multi-driver economic-capital proxy is educational, not production capital", "overall_rating": "HIGH", "mitigation_status": "MITIGATED", "category": "model_error", "owner": "Model Owner", "likelihood": "MEDIUM", "impact": "HIGH", "description": "The Phase 15 multi-driver (short-rate + equity) nested/LSMC economic-capital proxy (Tasks 1-4) is fitted on PLACEHOLDER HW1F / GBM parameters, omits material risk drivers (lapse, mortality/longevity trend, credit spread, FX, liquidity, management action), uses an educational single-guarantee liability, and has NOT been independently reviewed (APS X2). The 99.5% VaR/ES and SCR-proxy figures it produces are illustrative only and must not be used for regulatory or internal economic-capital reporting until parameters are calibrated to credentialled market data, the omitted drivers are brought into the tail, and an independent reviewer signs off.", "mitigation": "Classify all multi-driver capital output as EDUCATIONAL ONLY in the limitation card and at the API boundary; bound proxy error by the Task 2 out-of-sample validation (OOS R^2=0.9704, VaR rel err 3.21%) and outer-sampling error by the Task 4 bootstrap CI (SE ~1.66%); benchmark every aggregated figure to the Task 3 nested ground truth. Residual closure requires credentialled-data calibration + independent APS X2 review (tracked jointly with MR-006 / MR-008).", "related_standard": "IA TAS M \u00a73.6; APS X2 \u00a73; SOA ASOP 56 \u00a73.5", "updated_at": "2026-06-07T08:25:03.762431+00:00"}, {"risk_id": "MR-012", "title": "Credit-spread driver and three-driver economic-capital proxy are educational, not production capital", "overall_rating": "HIGH", "mitigation_status": "MITIGATED", "category": "model_error", "owner": "Model Owner", "likelihood": "MEDIUM", "impact": "HIGH", "description": "Phase 17 adds a CIR++ mean-reverting credit-spread driver (par_model_v2/stochastic/credit_spread.py) as the third risk factor in the nested/LSMC economic-capital proxy (rate + equity + credit-spread), with a reduced-form hazard x LGD credit-loss component on spread-sensitive backing assets. The CIR++ parameters (mean-reversion, long-run spread, vol, risk premium) and the hazard/LGD assumptions are PLACEHOLDER educational defaults, NOT calibrated to credentialled credit-market data; the trivariate LSMC surface still omits material drivers (lapse, mortality/longevity trend, FX, liquidity, management action) and has NOT been independently reviewed (APS X2). The three-driver 99.5% VaR/ES and SCR-proxy figures are illustrative only and must not be used for regulatory or internal economic-capital reporting until the credit parameters are calibrated, the omitted drivers are brought into the tail, and an independent reviewer signs off.", "mitigation": "Classify all three-driver capital output as EDUCATIONAL ONLY in the consolidated limitation card and at the API boundary; bound proxy error by the Task 2 trivariate out-of-sample validation (OOS R^2=0.9751; selected basis deg1/max-int3; leakage-free) and outer-sampling error by the Task 4 three-driver bootstrap CI (VaR 150,859 with 95% CI [149,634, 152,369], SE 692 / +-0.91%); benchmark every aggregated figure to the Task 3 three-driver nested ground truth. Residual closure requires credentialled credit-data calibration + independent APS X2 review (tracked jointly with MR-006 / MR-008 / MR-011).", "related_standard": "IA TAS M \u00a73.6; APS X2 \u00a73; SOA ASOP 56 \u00a73.5; ASOP 25 \u00a73.3", "updated_at": "2026-06-07T09:14:22.447046+00:00"}, {"risk_id": "MR-013", "title": "Two-factor rates market consistency not fully calibrated", "overall_rating": "HIGH", "mitigation_status": "IN_PROGRESS", "category": "model_error", "owner": "Assumption Owner", "likelihood": "MEDIUM", "impact": "HIGH", "description": "The G2++ rates driver now has analytic zero-coupon and bond-option formulas, but parameters are educational until calibrated to a swaption volatility surface and validated through martingale and capital-impact gates.", "mitigation": "Complete Phase 20 Tasks 2-4: swaption-surface calibration, market-consistency martingale gate, and capital re-aggregation/tail diagnostics with independent review.", "related_standard": "SOA ASOP 56 section 3.5; IA TAS M section 3.6", "updated_at": "2026-06-06T09:25:48.971900+00:00"}, {"risk_id": "MR-014", "title": "Management-action omission in liability / capital model", "overall_rating": "HIGH", "mitigation_status": "MITIGATED", "category": "assumption_error", "owner": "ChiefActuary", "likelihood": "HIGH", "impact": "MEDIUM", "description": "Policyholder options (dynamic lapse) are modelled but insurer management actions are not: reversionary-bonus participation is static, so TVOG and tail capital are biased upward relative to a realistic with-management-action basis (ASOP 56 3.1.3 asymmetry; Solvency II Art. 23).", "mitigation": "Phase 23 Task 3: governed dynamic reversionary-bonus participation cut entering the nested ground truth and the proxy basis, validated OOS at fixed pre-registered gates.", "related_standard": "ASOP 56 3.1.3/3.4; TAS M 3.2; SII Art. 23", "updated_at": "2026-06-08T01:31:12.922476+00:00"}, {"risk_id": "MR-015", "title": "Copula-FORM / radial-asymmetry residual not closed by the skew-t upper-tail scalar", "overall_rating": "HIGH", "mitigation_status": "OPEN", "category": "model_error", "owner": "Head of Capital Modelling (educational placeholder)", "likelihood": "MEDIUM", "impact": "HIGH", "description": "The frozen-t copula-form residual (~6,120; 91.9% of the 14.29% nested-vs-frozen gap) is NOT a standalone-driver upper-tail radial-asymmetry effect: fitting the GH skew-t skewness gamma leakage-free to the realised upper-tail co-exceedances pins it at the boundary (gamma_hat ~ 6.2e-5), so the skew-t draw is near-radially-symmetric (radial asymmetry ~ 0 at p=0.90) and the copula-form residual falls only ~0.09% (6,120 -> 6,115). The residual lives in nested inner-path joint dynamics that a copula on standalone margins cannot represent.", "mitigation": "Escalate the dependence structure beyond a single radially (a)symmetric copula: grouped-t (Daul et al. 2003) as the indicated next step, vine / pair-copula (Aas et al. 2009) the general fallback; scheduled for Phase 28. Until then the residual is quantified, disclosed, and the path-wise nested truth (46,638.9) is reported alongside the frozen-copula component (39,975.7).", "related_standard": "Solvency II Art. 234; Demarta & McNeil (2005); McNeil, Frey & Embrechts (2015) QRM ch.7; IFoA Modelling Practice Note s4", "updated_at": "2026-06-08T12:25:18.156272+00:00"}, {"risk_id": "MR-016", "title": "Heterogeneous-tail / cross-block-dilution copula-FORM residual not closed by the grouped-t per-block df", "overall_rating": "HIGH", "mitigation_status": "OPEN", "category": "model_error", "owner": "Head of Capital Modelling (educational placeholder)", "likelihood": "MEDIUM", "impact": "HIGH", "description": "The realised standalone within-FIN upper co-exceedance (0.125) sits BELOW the cross-block level (0.172), so the leakage-free per-block df fit pins df_NONFIN 37.866 / df_FIN 8.506 ABOVE the frozen 2.9451 (lighter within-block tails); on common random numbers the grouped-t therefore DILUTES cross-block co-movement vs the single-df t maximal-cross-block boundary (grouped cross-block upper 0.1703 < single 0.2573 at p=0.90) and moves the disclosed component SCR DOWN 10.93%. The copula-FORM residual to the nested truth WIDENS from the skew-t-reconfirmed 6,114.9 to 10,491.5 (Phase 28 Task 3). This is the SECOND negative super-set result after the skew-t (gamma_hat ~ 0): a single copula on the standalone margins, whether asymmetric or block-heterogeneous, cannot close the UPWARD nested residual; it lives in nested inner-path joint dynamics.", "mitigation": "Escalate the dependence structure beyond a single copula on the standalone margins: vine / pair-copula (Aas et al. 2009 - pair-copula constructions capturing conditional / inner-path joint dynamics) as the general fallback, scheduled for Phase 29. Until then the residual is quantified, disclosed, and the path-wise nested truth (46,638.9) is reported alongside the governed frozen-copula component (39,975.7, the conservative maximal-cross-block boundary) so users see the conservative bound; the grouped-t DOWN move is DISCLOSED, not adopted.", "related_standard": "Solvency II Art. 234; Daul et al. (2003); McNeil, Frey & Embrechts (2015) QRM ch.7; Aas et al. (2009); IFoA Modelling Practice Note s4", "updated_at": "2026-06-11T08:20:42.985903+00:00"}, {"risk_id": "MR-017", "title": "Residual nested inner-path joint dynamics not representable by the truncated credit-root pair-link prototype (vine-FORM limitation)", "overall_rating": "HIGH", "mitigation_status": "OPEN", "category": "model_error", "owner": "Head of Capital Modelling (educational placeholder)", "likelihood": "MEDIUM", "impact": "HIGH", "description": "The Phase 29 truncated credit-root C-vine prototype (max two trees, capped pair-family set, rank-preserving tail tilts on the frozen single-df t base) NARROWS the copula-form residual to 3,637.3 (from skew-t 6,114.9 / grouped-t 10,491.5) and lifts the component SCR +2,314.4 mean (CRN, positive in 100% of replicates), but the nested path-wise truth 46,638.9 remains OUTSIDE the vine 95% bootstrap CI [38,654.7, 45,284.3]. The remaining residual is attributed to (i) the truncation at two trees, (ii) the capped pair-family set and educational tilt simulator (not a full vine calibration), and (iii) nested inner-path joint dynamics that margins-level dependence cannot represent. Task 4 fit-vs-holdout diagnostics show the tilt is concentrated on fitted links (max holdout |lift| 0.0414 <= max fitted-pair |lift| 0.8514), so the narrowing is not an overfit artefact of never-fitted pairs.", "mitigation": "Candidate next steps (design-note-first, owner sign-off required): full conditional pair-copula calibration (h-function based, untruncated where material), nested-aware dependence calibrated on inner-path joint outcomes, or adoption of the vine candidate as a DISCLOSED alternative read-out alongside the governed frozen-t headline. Until then the residual is quantified and disclosed; the nested truth 46,638.9 is reported alongside the governed component 39,975.7.", "related_standard": "Aas et al. (2009); Joe (2014) ch.2; Solvency II Art. 234; IFoA Modelling Practice Note s4", "updated_at": "2026-06-11T08:20:42.985936+00:00"}], "change_records_supplement": [{"record_id": "391700530a174ec1bc3b99a0c16e808d", "title": "Phase 27 Task 1 - design note: richer upper-tail dependence copula (skew-t upper-tail-asymmetry parameter on the frozen t copula)", "status": "OWNER_REVIEW", "change_type": "governance_change", "created_at": "2026-06-08T08:17:43.280792+00:00", "author": "Phase27Task1DesignNote", "phase": "Phase 27: Richer Tail-Dependence Copula", "peer_reviewer": null, "standard_references": ["Solvency II Delegated Reg. Art. 234 (empirically justified diversification incl. tail behaviour; dependence justified on the basis actually used for capital)", "Solvency II Delegated Reg. Art. 23 (future management actions: objective, realistic, verifiable)", "SOA ASOP 56 \u00a73.1.3/\u00a73.4/\u00a73.5", "SOA ASOP 25 \u00a73.3", "IA TAS M \u00a73.2/\u00a73.6", "IFoA Life Aggregation & Simulation working party", "Demarta & McNeil (2005), The t copula and related copulas (skew-t copula)", "McNeil, Frey & Embrechts (2015), Quantitative Risk Management ch. 7 (GH skew-t; tail dependence)", "Daul, De Giorgi, Lindskog & McNeil (2003), The grouped t-copula", "Aas, Czado, Frigessi & Bakken (2009), Pair-copula constructions of multiple dependence (vine (function(){
  function parseEmbedded(){
    var el = document.getElementById("ui-data");
    if(!el) return null;
    var raw = el.textContent || "";
    raw = raw.replace("/*__UI_DATA__*/","").trim();
    if(!raw || raw === "null") return null;
    try { return JSON.parse(raw); } catch(e){ return null; }
  }
  var DATA = parseEmbedded();

  function esc(s){ return String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    return Number(x).toLocaleString(undefined,{maximumFractionDigits:(d==null?0:d)}); }

  // Neutral default (no symbol, comma thousands, 0 dp) renders bit-identically

  function curMeta(){ return (DATA && DATA.meta && DATA.meta.currency) || null; }
  function fmtMoney(x){
    if(x==null||isNaN(x)) return "--";
    var c = curMeta()||{}, d = (c.decimals!=null?c.decimals:0);
    var neg = Number(x)<0, v = Math.abs(Number(x));
    var parts = v.toFixed(d).split(".");
    var sep = (c.thousands==="space")?" ":(c.thousands==="none")?"":",";
    var ip = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, sep);
    return (neg?"-":"")+(c.symbol||"")+ip+(parts.length>1?("."+parts[1]):"");
  }
  function chipClass(s){ s=String(s||"").toUpperCase();
    if(/PASS|CLEAR|MITIGAT|APPROV|OK/.test(s)) return "pass";

  var _hashApplying=false;
  function activateTab(target, fromHash){
    [].forEach.call(document.querySelectorAll("#tabs .tab"),function(x){
      var on=x.getAttribute("data-target")===target;
      x.classList.toggle("active",on);
      x.setAttribute("aria-selected", on?"true":"false");
      x.setAttribute("tabindex", on?"0":"-1");
    });
    [].forEach.call(document.querySelectorAll(".panel"),function(x){ x.classList.remove("active"); });
    var pl=document.getElementById(target); if(pl) pl.classList.add("active");
    // Phase 33 Task 5 (gap G4): persist the selected tab in the URL hash so it
    // survives a reload. Uses the URL hash ONLY (no browser web-storage),
    // which is file:// safe for the offline zero-install build. The _hashApplying
    // guard avoids a hashchange feedback loop when we are reacting to one.
    if(!fromHash){
      _hashApplying=true;
      try{
        if(window.history&&typeof history.replaceState==="function"){
          history.replaceState(null,"","#"+target+(document.documentElement.classList.contains("hc")?"&hc=1":""));
        } else { location.hash=target+(document.documentElement.classList.contains("hc")?"&hc=1":""); }
      }catch(_e){ try{ location.hash=target+(document.documentElement.classList.contains("hc")?"&hc=1":""); }catch(_e2){} }
      _hashApplying=false;
    }
  }
  // Phase 33 Task 5 (gap G4): on load / hashchange, restore the tab named in the
  // URL hash if it is a real tab. No storage APIs; safe under file://.
  // Phase 34 Task 3 (gap H2): the hash may additionally carry an in-tab section as
  // "tab~section" (deep-linkable read-out). The "~" separator never occurs in a
  // tab id, so a plain "#tab" hash keeps the exact Phase 33 G4 behaviour.
  function tabFromHash(){
    if(_hashApplying) return;
    var h=(location.hash||"").replace(/^#/,""); h=h.split("&")[0];
    if(!h) return;
    var parts=h.split("~"), tab=parts[0], sec=parts.length>1?parts.slice(1).join("~"):"";
    if(tab && document.getElementById("tab-"+tab) && document.getElementById(tab)){
      activateTab(tab, true);
      if(sec){ var el=document.getElementById(sec); if(el) revealReadout(el); }
    }
  }
  // Phase 33 Task 5 (gap G4): give every data table an accessible name via a
  // visually-hidden <caption>, derived from the owning panel's data-title or the
  // nearest preceding heading. Idempotent; adds NO visible content and changes
  // no rendered figure (tbody rows untouched).
  function captionTables(root){
    var scope=root||document;
    [].forEach.call(scope.querySelectorAll("table"),function(tb){
      if(tb.querySelector("caption")) return;
      var lbl="";
      var panel=tb.closest?tb.closest(".panel"):null;
      if(panel&&panel.getAttribute("data-title")) lbl=panel.getAttribute("data-title")+" table";
      if(!lbl){ var h=tb.previousElementSibling;
        while(h&&!/^H[1-6]$/.test(h.tagName)) h=h.previousElementSibling;
        if(h) lbl=(h.textContent||"").trim(); }
      if(!lbl) lbl="Data table";
      var cap=document.createElement("caption");
      cap.className="sr-only"; cap.textContent=lbl;
      tb.insertBefore(cap, tb.firstChild);
    });
  }

  // ===== Phase 34 Task 3 (gap H2): global cross-tab search + deep-link read-outs =====
  // DISPLAY LAYER ONLY. The index is built from text ALREADY rendered in the
  // artifact (tab titles, headline labels: headings/sub-headings/chart+table
  // captions, and card labels). Nothing is fetched and no model figure is
  // recomputed. A match scrolls to its element and flashes a CSS outline; the
  // element's TEXT is NEVER mutated, so the governed frozen-t headline is findable
  // yet never re-labelled. Deep links use the URL hash ONLY (no storage; file://).
  var SEARCH_INDEX=[];
  function readoutSlug(s){
    return String(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,48);
  }
  function buildSearchIndex(){
    SEARCH_INDEX=[];
    var seen={};
    TABS.forEach(function(p){
      var tab=p[0], title=p[1];
      var panel=document.getElementById(tab);
      if(!panel) return;
      // (a) the tab itself -> jumps to the panel top
      SEARCH_INDEX.push({tab:tab, anchor:tab, label:title, where:title, kind:"tab"});
      // (b) in-panel headline labels + captions, then card read-outs
      var entries=[];
      [].forEach.call(panel.querySelectorAll("h1,h2,h3,h4,.subh,.chartwrap .cap,caption"),function(el){
        entries.push([el,(el.textContent||"")]);
      });
      [].forEach.call(panel.querySelectorAll(".card"),function(card){
        var k=card.querySelector(".k");
        entries.push([card, k?(k.textContent||""):(card.textContent||"")]);
      });
      var n=0;
      entries.forEach(function(pair){
        var el=pair[0], txt=(pair[1]||"").replace(/\s+/g," ").trim();
        if(!txt || txt.length<2) return;
        if(seen["L:"+tab+":"+txt]) return; // dedupe identical labels within a tab
        var anchor=el.id;
        if(!anchor){ anchor="dl-"+tab+"-"+(readoutSlug(txt)||"x"); while(seen["A:"+anchor]){ anchor="dl-"+tab+"-"+(readoutSlug(txt)||"x")+"-"+(n++); } el.id=anchor; }
        seen["L:"+tab+":"+txt]=1; seen["A:"+anchor]=1;
        SEARCH_INDEX.push({tab:tab, anchor:anchor, label:txt, where:title, kind:"readout"});
      });
    });
    return SEARCH_INDEX;
  }
  // Scroll to + briefly flash a read-out WITHOUT changing its text (the governed
  // headline is never re-labelled). The flash is a transient CSS class only.
  function revealReadout(el){
    if(!el) return;
    try{ if(el.scrollIntoView) el.scrollIntoView({block:"center"}); }catch(_e){ try{ el.scrollIntoView(); }catch(_e2){} }
    el.classList.remove("dl-flash");
    void el.offsetWidth; // reflow so a repeat jump re-triggers the animation
    el.classList.add("dl-flash");
    try{
      if(!el.hasAttribute("tabindex")){ el.setAttribute("tabindex","-1"); }
      if(typeof el.focus==="function") el.focus({preventScroll:true});
    }catch(_e3){}
    setTimeout(function(){ try{ el.classList.remove("dl-flash"); }catch(_e4){} }, 1700);
  }
  // Activate the owning tab, write the deep-link hash (URL only), then reveal.
  function goToReadout(tab, anchor){
    if(document.getElementById("tab-"+tab) && document.getElementById(tab)){ activateTab(tab); }
    var newHash="#"+tab+((anchor && anchor!==tab)?("~"+anchor):"")+(document.documentElement.classList.contains("hc")?"&hc=1":"");
    _hashApplying=true;
    try{
      if(window.history && typeof history.replaceState==="function"){ history.replaceState(null,"",newHash); }
      else { location.hash=newHash.slice(1); }
    }catch(_e){ try{ location.hash=newHash.slice(1); }catch(_e2){} }
    _hashApplying=false;
    var el=document.getElementById(anchor);
    if(el) revealReadout(el);
  }
  var _gsWired=false;
  function wireGlobalSearch(){
    var input=document.getElementById("gsearchInput");
    var box=document.getElementById("gsearchResults");
    if(!input||!box) return;
    if(_gsWired) return; // listeners attach once; index is rebuilt every render
    _gsWired=true;
    var cur=-1, results=[];
    function close(){ box.hidden=true; box.innerHTML=""; cur=-1; input.setAttribute("aria-expanded","false"); }
    function render(){
      if(!results.length){ box.innerHTML='<div class="gsearch-empty">No matches</div>'; box.hidden=false; input.setAttribute("aria-expanded","true"); return; }
      box.innerHTML=results.map(function(r,i){
        return '<div class="gsearch-item'+(i===cur?" active":"")+'" role="option" data-i="'+i+'" id="gsres-'+i+'" aria-selected="'+(i===cur?"true":"false")+'">'+
          esc(r.label)+'<span class="gs-where">'+esc(r.where)+(r.kind==="tab"?" &middot; tab":"")+'</span></div>';
      }).join("");
      box.hidden=false; input.setAttribute("aria-expanded","true");
    }
    function query(q){
      q=(q||"").toLowerCase().trim();
      if(!q){ results=[]; close(); return; }
      var out=[];
      for(var i=0;i<SEARCH_INDEX.length && out.length<20;i++){
        if(SEARCH_INDEX[i].label.toLowerCase().indexOf(q)!==-1) out.push(SEARCH_INDEX[i]);
      }
      results=out; cur=results.length?0:-1; render();
    }
    function go(i){ var r=results[i]; if(!r) return; close(); goToReadout(r.tab, r.anchor); }
    input.addEventListener("input",function(){ query(input.value); });
    input.addEventListener("focus",function(){ if(input.value) query(input.value); });
    input.addEventListener("keydown",function(e){
      if(e.key==="ArrowDown"){ e.preventDefault(); if(results.length){ cur=(cur+1)%results.length; render(); } }
      else if(e.key==="ArrowUp"){ e.preventDefault(); if(results.length){ cur=(cur-1+results.length)%results.length; render(); } }
      else if(e.key==="Enter"){ e.preventDefault(); if(cur>=0) go(cur); }
      else if(e.key==="Escape"){ e.preventDefault(); close(); }
    });
    box.addEventListener("click",function(e){
      var it=(e.target&&e.target.closest)?e.target.closest(".gsearch-item"):null;
      if(it) go(parseInt(it.getAttribute("data-i"),10));
    });
    document.addEventListener("click",function(e){
      if(!input.contains(e.target) && !box.contains(e.target)) close();
    });
  }

  function barChart(items,opts){
    opts=opts||{};
    var W=opts.w||660, H=opts.h||300, mL=50, mR=16, mT=16, mB=opts.mB||48;
    var iw=W-mL-mR, ih=H-mT-mB;

    var maxV=opts.max!=null?opts.max:Math.max.apply(null,vals); maxV=(maxV>0?maxV:1)*1.10;
    var n=items.length, step=iw/n, bw=step*0.62;
    var Y=function(v){ return mT+ih-(v/maxV)*ih; };

    s+='<line class="axis" x1="'+mL+'" y1="'+(mT+ih)+'" x2="'+(W-mR)+'" y2="'+(mT+ih)+'"/>';
    items.forEach(function(d,i){
      var x=mL+i*step+(step-bw)/2, by=Y(d.value||0), bh=mT+ih-by;
      s+='<rect class="bar" x="'+x+'" y="'+by+'" width="'+bw+'" height="'+Math.max(0,bh)+'" rx="3" '+
        'fill="'+(d.color||'var(--accent)')+'"'+(d.stroke?(' stroke="'+d.stroke+'" stroke-width="2"'):'')+

      s+='<text class="val" x="'+(x+bw/2)+'" y="'+(by-5)+'" text-anchor="middle">'+fmtK(d.value)+'</text>';

      s+='<text x="'+(W-mR)+'" y="'+(ry-4)+'" text-anchor="end" fill="'+(r.color||'var(--ink)')+'">'+esc(r.label)+'</text>';

  function ciChart(rows,opts){
    opts=opts||{};
    var W=opts.w||680, rowH=70, mT=14, mB=30, mL=86, mR=28;
    var H=mT+mB+rows.length*rowH;
    var av=[]; rows.forEach(function(r){ av.push(r.lo,r.hi,r.point); });
    var lo=Math.min.apply(null,av), hi=Math.max.apply(null,av);
    var pad=(hi-lo)*0.18||1; lo-=pad; hi+=pad;
    var X=function(v){ return mL+(v-lo)/(hi-lo)*(W-mL-mR); };
    var s=svgOpen(W,H);
    for(var t=0;t<=4;t++){ var tv=lo+(hi-lo)*t/4, tx=X(tv);
      s+='<line class="grid" x1="'+tx+'" y1="'+mT+'" x2="'+tx+'" y2="'+(H-mB)+'"/>';
      s+='<text x="'+tx+'" y="'+(H-mB+16)+'" text-anchor="middle">'+fmtK(tv)+'</text>'; }
    rows.forEach(function(r,i){
      var cy=mT+i*rowH+rowH/2, c=r.color||'var(--accent)';
      s+='<text class="val" x="'+(mL-12)+'" y="'+(cy-3)+'" text-anchor="end">'+esc(r.label)+'</text>';
      s+='<text x="'+(mL-12)+'" y="'+(cy+13)+'" text-anchor="end">'+fmtK(r.point)+'</text>';
      var x1=X(r.lo), x2=X(r.hi), xp=X(r.point);

      s+='<line x1="'+x1+'" y1="'+(cy-8)+'" x2="'+x1+'" y2="'+(cy+8)+'" stroke="'+c+'" stroke-width="2"/>';
      s+='<line x1="'+x2+'" y1="'+(cy-8)+'" x2="'+x2+'" y2="'+(cy+8)+'" stroke="'+c+'" stroke-width="2"/>';
      s+='<circle cx="'+xp+'" cy="'+cy+'" r="6" fill="var(--ink)" stroke="'+c+'" stroke-width="2" data-tip="'+ta(r.tip)+'"/>';
    });

  }

  function lineChart(series,xvals,opts){
    opts=opts||{};
    var W=opts.w||680, H=opts.h||300, mL=58, mR=20, mT=18, mB=44;
    var iw=W-mL-mR, ih=H-mT-mB;
    var allY=[]; series.forEach(function(se){ allY=allY.concat(se.data); });
    var minY=Math.min.apply(null,allY), maxY=Math.max.apply(null,allY);
    var pad=(maxY-minY)*0.15||1; minY-=pad; maxY+=pad;
    var xmin=Math.min.apply(null,xvals), xmax=Math.max.apply(null,xvals);
    var X=function(v){ return mL+(xmax===xmin?0:(v-xmin)/(xmax-xmin)*iw); };
    var Y=function(v){ return mT+ih-(v-minY)/(maxY-minY)*ih; };
    var s=svgOpen(W,H);
    for(var g=0;g<=4;g++){ var gv=minY+(maxY-minY)*g/4, gy=Y(gv);
      s+='<line class="grid" x1="'+mL+'" y1="'+gy+'" x2="'+(W-mR)+'" y2="'+gy+'"/>';
      s+='<text x="'+(mL-6)+'" y="'+(gy+3)+'" text-anchor="end">'+fmtK(gv)+'</text>'; }
    s+='<line class="axis" x1="'+mL+'" y1="'+(mT+ih)+'" x2="'+(W-mR)+'" y2="'+(mT+ih)+'"/>';
    xvals.forEach(function(xv){ var px=X(xv);
      s+='<text x="'+px+'" y="'+(mT+ih+16)+'" text-anchor="middle">'+fmtK(xv)+'</text>'; });
    if(opts.markX!=null){ var mx=X(opts.markX);
      s+='<line class="refline" x1="'+mx+'" y1="'+mT+'" x2="'+mx+'" y2="'+(mT+ih)+'" '+
        'stroke="var(--warn)" stroke-dasharray="5 4" data-tip="'+ta("Recommended outer count n* = "+num(opts.markX))+'"/>';
      s+='<text x="'+mx+'" y="'+(mT-4)+'" text-anchor="middle" fill="var(--warn)">n*='+fmtK(opts.markX)+'</text>'; }
    series.forEach(function(se){
      var d=""; se.data.forEach(function(v,i){ d+=(i?"L":"M")+X(xvals[i])+" "+Y(v)+" "; });
      s+='<path d="'+d+'" fill="none" stroke="'+se.color+'" stroke-width="2.2"/>';
      se.data.forEach(function(v,i){
        s+='<circle cx="'+X(xvals[i])+'" cy="'+Y(v)+'" r="4.5" fill="'+se.color+'" data-tip="'+
          ta("<b>"+se.label+"</b><br>n_outer = "+num(xvals[i])+"<br>"+se.label+" = "+num(v))+'"/>'; });
    });
    return s+'</svg>';
  }

  function wireTips(container){
    var tip=document.getElementById("__tip");
    if(!tip){ tip=document.createElement("div"); tip.id="__tip"; tip.className="tipbox"; document.body.appendChild(tip); }
    container.addEventListener("mousemove",function(e){
      var t=(e.target&&e.target.getAttribute)?e.target.getAttribute("data-tip"):null;
      if(t){ tip.innerHTML=t; tip.classList.add("on");
        tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY+16)+"px";
      } else { tip.classList.remove("on"); }
    });
    container.addEventListener("mouseleave",function(){ tip.classList.remove("on"); });
  }

  // ---- Governance & assumptions view (UI Task 4) ----
  var GLIK=["VERY_LOW","LOW","MEDIUM","HIGH","CRITICAL"];
  var GIMP=["VERY_LOW","LOW","MEDIUM","HIGH","CRITICAL"];
  function gLvl(s){ s=String(s||"").toUpperCase().replace(/\s+/g,"_");
    var m={VERY_LOW:0,VL:0,LOW:1,L:1,MEDIUM:2,MODERATE:2,MED:2,M:2,HIGH:3,H:3,CRITICAL:4,VERY_HIGH:4,SEVERE:4};
    return (m[s]!=null)?m[s]:-1; }

  function govIntegrity(g){
    var ae=(typeof g.audit_entries==="number")?g.audit_entries:((g.audit_entries||[]).length||0);
    var ver=(g.audit_verified!=null)?g.audit_verified:ae;
    var fail=(g.audit_failed!=null)?g.audit_failed:0;
    var steps=0; (g.change_records||[]).forEach(function(c){ steps+=(c.sign_off_history||[]).length; });
    var ok=(fail===0)&&(ver===ae)&&(g.audit_integrity_ok!==false);
    return {ok:ok,entries:ae,verified:ver,failed:fail,signoff_steps:steps,records:(g.change_records||[]).length};
  }

  function riskHeatmap(risks){
    var W=440,H=300,mL=92,mT=12,mB=60,mR=14;
    var cols=5,rows=5,cw=(W-mL-mR)/cols,ch=(H-mT-mB)/rows;
    var grid={}; risks.forEach(function(r){ var li=gLvl(r.likelihood),ii=gLvl(r.impact);
      if(li<0||ii<0) return; var k=ii+'_'+li; grid[k]=(grid[k]||0)+1; });
    var s=svgOpen(W,H);
    for(var ri=0;ri<rows;ri++){ var imp=rows-1-ri;
      for(var ci=0;ci<cols;ci++){
        var x=mL+ci*cw, y=mT+ri*ch, n=grid[imp+'_'+ci]||0, score=imp+ci;
        var col=score>=6?'rgba(255,107,107,':(score>=4?'rgba(255,180,84,':(score>=2?'rgba(79,156,255,':'rgba(57,217,138,'));
        s+='<rect x="'+x+'" y="'+y+'" width="'+(cw-3)+'" height="'+(ch-3)+'" rx="4" fill="'+col+(n>0?'0.85':'0.12')+')" '+
          'stroke="var(--line)" data-tip="'+ta('Impact '+GIMP[imp].replace('_',' ')+' × Likelihood '+GLIK[ci].replace('_',' ')+'<br>'+n+' risk(s)')+'"/>';
        if(n>0) s+='<text class="val" x="'+(x+(cw-3)/2)+'" y="'+(y+(ch-3)/2+4)+'" text-anchor="middle">'+n+'</text>';
      }
    }
    for(var c2=0;c2<cols;c2++){ s+=xlabel(GLIK[c2].replace('_',' '), mL+c2*cw+(cw-3)/2, mT+rows*ch+12); }
    for(var r2=0;r2<rows;r2++){ var imp2=rows-1-r2;
      s+='<text x="'+(mL-8)+'" y="'+(mT+r2*ch+(ch-3)/2+3)+'" text-anchor="end">'+esc(GIMP[imp2].replace('_',' '))+'</text>'; }
    s+='<text x="'+(mL+(W-mL-mR)/2)+'" y="'+(H-4)+'" text-anchor="middle">Likelihood &rarr;</text>';
    return s+'</svg>';
  }

  function downloadBlob(name,blob){

      document.body.appendChild(a); a.click();

  function svgToPng(svg,filename){
    try{

      var clone=svg.cloneNode(true); clone.setAttribute("xmlns",SVGNS);
      var vb=(svg.getAttribute("viewBox")||"0 0 660 300").split(/\s+/);
      var w=parseFloat(vb[2])||660, h=parseFloat(vb[3])||300, scale=2;
      clone.setAttribute("width",w); clone.setAttribute("height",h);
      var st=document.createElementNS(SVGNS,"style"); st.textContent=CHART_EXPORT_CSS;
      var bg=document.createElementNS(SVGNS,"rect");
      bg.setAttribute("x",0); bg.setAttribute("y",0); bg.setAttribute("width",w); bg.setAttribute("height",h); bg.setAttribute("fill","#1d2733");
      clone.insertBefore(bg,clone.firstChild); clone.insertBefore(st,clone.firstChild);
      var xml=new XMLSerializer().serializeToString(clone);
      var url="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(xml)));
      var img=new Image();
      img.onload=function(){
        var cv=document.createElement("canvas"); cv.width=w*scale; cv.height=h*scale;
        var ctx=cv.getContext("2d"); ctx.scale(scale,scale); ctx.drawImage(img,0,0);
        if(cv.toBlob){ cv.toBlob(function(bl){ if(bl) downloadBlob(filename,bl); },"image/png"); }
        else { downloadBlob(filename,dataURLtoBlob(cv.toDataURL("image/png"))); }
      };
      img.onerror=function(){};
      img.src=url;
    }catch(e){}
  }

  // Phase 34 Task 2 (gap H1): self-describing data-contract guard. Reads the
  // build-time contract_manifest embedded in the payload and validates the
  // embedded snapshot against it at LOAD time. Inspects ONLY the embedded
  // payload; recomputes NO model figure. Returns a plain status object.
  function validateContract(){
    var res={ dataPresent:!!DATA, manifestPresent:false, expected:null,
              actual:null, versionMatch:false, keys:[], missing:[],
              allPresent:false, status:"DEGRADED", reason:"" };
    if(!DATA){ res.reason="no embedded payload"; return res; }
    res.actual = (DATA.contract_version!=null)?String(DATA.contract_version):null;
    var man = DATA.contract_manifest;
    if(!man || typeof man!=="object"){
      res.reason="contract_manifest absent (pre-1.18.0 payload)";
      return res;
    }
    res.manifestPresent=true;
    res.expected = (man.expected_contract_version!=null)?String(man.expected_contract_version):null;
    res.versionMatch = (res.expected!=null && res.actual!=null && res.expected===res.actual);
    var req = (man.required_top_level_keys||[]).slice();
    res.keys = req.map(function(k){
      return { key:k, present: Object.prototype.hasOwnProperty.call(DATA,k) };
    });
    res.missing = res.keys.filter(function(x){return !x.present;})
                          .map(function(x){return x.key;});
    res.allPresent = (res.missing.length===0);
    res.status = (res.versionMatch && res.allPresent) ? "PASS" : "DEGRADED";
    if(res.status==="PASS") res.reason="contract verified";
    else if(!res.versionMatch && !res.allPresent) res.reason="version mismatch + missing sections";
    else if(!res.versionMatch) res.reason="contract version mismatch";
    else res.reason="missing required sections";
    return res;
  }

      return;

    var msg;
    if(!v.dataPresent){
      msg="No data payload is embedded in this file, so the result tabs cannot be populated.";
    } else if(!v.manifestPresent){
      msg="This snapshot predates the data-contract manifest (pre-1.18.0). The integrity guard cannot verify the payload; the tabs render the embedded values as-is.";
    } else {
      var bits=[];
      if(!v.versionMatch) bits.push("the embedded contract version ("+esc(v.actual||"none")+") differs from the version this build expects ("+esc(v.expected||"none")+")");
      if(!v.allPresent){
        var n=v.missing.length;
        bits.push(n+" required data section"+(n===1?"":"s")+" "+(n===1?"is":"are")+" missing ("+esc(v.missing.join(", "))+")");
      }
      msg="Data-contract check reported a mismatch: "+bits.join("; ")+". Affected tabs may be incomplete; open the Integrity (H1) tab for the per-section detail. No figures are recomputed.";
    }

  // SHA-256 digests computed by this SAME source, so the browser recompute
  // agrees byte-for-byte by construction.
  function _ciCanon(v){
    if(v===null||v===undefined) return "null";
    var t=typeof v;
    if(t==="number") return isFinite(v)?String(v):"null";
    if(t==="boolean") return v?"true":"false";
    if(t==="string") return JSON.stringify(v);
    if(Object.prototype.toString.call(v)==="[object Array]"){
      var a=[]; for(var i=0;i<v.length;i++) a.push(_ciCanon(v[i]));
      return "["+a.join(",")+"]";
    }
    var ks=Object.keys(v).sort(), p=[];
    for(var j=0;j<ks.length;j++) p.push(JSON.stringify(ks[j])+":"+_ciCanon(v[ks[j]]));
    return "{"+p.join(",")+"}";
  }
  function _ciSha256(str){
    function rotr(x,n){return (x>>>n)|(x<<(32-n));}
    var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
      0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
      0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
      0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
      0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
      0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
      0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
      0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
    var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    var b=[],i,c,c2,cp;
    for(i=0;i<str.length;i++){
      c=str.charCodeAt(i);
      if(c<0x80) b.push(c);
      else if(c<0x800) b.push(0xc0|(c>>6),0x80|(c&0x3f));
      else if(c>=0xd800&&c<0xdc00){ c2=str.charCodeAt(++i); cp=0x10000+(((c&0x3ff)<<10)|(c2&0x3ff));
        b.push(0xf0|(cp>>18),0x80|((cp>>12)&0x3f),0x80|((cp>>6)&0x3f),0x80|(cp&0x3f)); }
      else b.push(0xe0|(c>>12),0x80|((c>>6)&0x3f),0x80|(c&0x3f));
    }
    var l=b.length; b.push(0x80);
    while(b.length%64!==56) b.push(0);
    var bl=l*8, hi=Math.floor(bl/0x100000000);
    b.push((hi>>>24)&0xff,(hi>>>16)&0xff,(hi>>>8)&0xff,hi&0xff);
    b.push((bl>>>24)&0xff,(bl>>>16)&0xff,(bl>>>8)&0xff,bl&0xff);
    var w=new Array(64),t,a,bb,cc,d,e,f,g,h,S0,S1,ch,maj,t1,t2,s0,s1;
    for(i=0;i<b.length;i+=64){
      for(t=0;t<16;t++) w[t]=((b[i+4*t]<<24)|(b[i+4*t+1]<<16)|(b[i+4*t+2]<<8)|(b[i+4*t+3]))|0;
      for(t=16;t<64;t++){
        s0=rotr(w[t-15],7)^rotr(w[t-15],18)^(w[t-15]>>>3);
        s1=rotr(w[t-2],17)^rotr(w[t-2],19)^(w[t-2]>>>10);
        w[t]=(((w[t-16]+s0)|0)+((w[t-7]+s1)|0))|0;
      }
      a=H[0];bb=H[1];cc=H[2];d=H[3];e=H[4];f=H[5];g=H[6];h=H[7];
      for(t=0;t<64;t++){
        S1=rotr(e,6)^rotr(e,11)^rotr(e,25);
        ch=(e&f)^((~e)&g);
        t1=(((((h+S1)|0)+((ch+K[t])|0))|0)+w[t])|0;
        S0=rotr(a,2)^rotr(a,13)^rotr(a,22);
        maj=(a&bb)^(a&cc)^(bb&cc);
        t2=(S0+maj)|0;
        h=g;g=f;f=e;e=(d+t1)|0;d=cc;cc=bb;bb=a;a=(t1+t2)|0;
      }
      H[0]=(H[0]+a)|0;H[1]=(H[1]+bb)|0;H[2]=(H[2]+cc)|0;H[3]=(H[3]+d)|0;
      H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
    }
    var hex="";
    for(i=0;i<8;i++) hex+=("00000000"+(H[i]>>>0).toString(16)).slice(-8);
    return hex;
  }
  function _ciSectionDigests(obj){
    var ks=Object.keys(obj).filter(function(k){return k!=="contract_manifest";}).sort();
    var sd={};
    for(var i=0;i<ks.length;i++) sd[ks[i]]=_ciSha256(_ciCanon(obj[ks[i]]));
    return { section_digests:sd, root_digest:_ciSha256(_ciCanon(sd)), keys:ks };
  }
  var GENERATOR_LABEL="scripts/build_phase35_task3_a2_digests.py (Phase 35 Task 3, gap A2)";

  // Phase 35 Task 3 (gap A2): in-browser tamper-evident content verifier.
  // RECOMPUTES the per-section SHA-256 digests from the embedded payload and
  // compares them to the build-time digests in contract_manifest. This is the
  // one integrity surface that DOES recompute - but it recomputes a DIGEST of
  // the embedded snapshot, not any model figure. No network, no storage API.
  function renderIntegrityVerifierHtml(){
    var man=DATA&&DATA.contract_manifest;
    var head='<h3 style="margin:18px 0 6px">Content integrity &mdash; per-section SHA-256 (recomputed in the browser)</h3>';
    if(!man||!man.section_digests||!man.root_digest){
      return head+'<p class="note">This snapshot predates per-section content digests (pre-1.20.0); '+
        'the integrity panel can verify section <b>presence</b> but not content. No figures are recomputed.</p>';
    }
    var algo=String(man.digest_algo||"sha256");
    var stored=man.section_digests, storedRoot=String(man.root_digest);
    var rec=_ciSectionDigests(DATA);
    var recSd=rec.section_digests;
    // union of stored + recomputed section keys (detect added/removed sections)
    var seen={}, all=[], i;
    var sk=Object.keys(stored), rk=rec.keys;
    for(i=0;i<sk.length;i++){ if(!seen[sk[i]]){seen[sk[i]]=1; all.push(sk[i]);} }
    for(i=0;i<rk.length;i++){ if(!seen[rk[i]]){seen[rk[i]]=1; all.push(rk[i]);} }
    all.sort();
    var rows='', nVer=0, nAlt=0, nMiss=0, nExtra=0;
    for(i=0;i<all.length;i++){
      var k=all[i], s=stored[k], r=recSd[k], st, cls;
      if(s===undefined){ st='added (no build digest)'; cls='fail'; nExtra++; }
      else if(r===undefined){ st='section missing'; cls='fail'; nMiss++; }
      else if(s===r){ st='verified'; cls='pass'; nVer++; }
      else { st='ALTERED'; cls='fail'; nAlt++; }
      rows+='<tr data-int-verify="'+(cls==='pass'?'ok':'alt')+'">'+
        '<td class="mono">'+esc(k)+'</td>'+
        '<td class="mono" title="'+esc(s||"--")+'">'+esc((s||"--").slice(0,16))+'</td>'+
        '<td class="mono" title="'+esc(r||"--")+'">'+esc((r||"--").slice(0,16))+'</td>'+
        '<td><span class="chip '+cls+'">'+esc(st)+'</span></td></tr>';
    }
    var rootMatch=(rec.root_digest===storedRoot);
    var allOk=(nAlt===0 && nMiss===0 && nExtra===0 && rootMatch);
    var badge=allOk
      ? '<span class="chip pass">INTEGRITY VERIFIED</span>'
      : '<span class="chip fail">CONTENT ALTERED</span>';
    var html=head+
      '<p class="note">Each top-level data section (every key except '+
      '<span class="mono">contract_manifest</span>) carries a build-time '+
      '<span class="mono">'+esc(algo)+'</span> digest written by '+
      '<span class="mono">'+esc(GENERATOR_LABEL)+'</span>. This panel RECOMPUTES those digests in your '+
      'browser from the embedded snapshot using a self-contained pure-JS SHA-256 '+
      '(no network, no storage) and compares them. A digest mismatch means the embedded content '+
      'was altered after the build. It recomputes a content digest, <b>not</b> a model figure.</p>'+
      '<div class="cards">'+
      '<div class="card"><div class="k">Overall</div><div class="v">'+badge+'</div></div>'+
      '<div class="card"><div class="k">Sections verified</div><div class="v">'+nVer+' / '+all.length+'</div></div>'+
      '<div class="card"><div class="k">Root digest match</div><div class="v">'+(rootMatch?'<span class="chip pass">yes</span>':'<span class="chip fail">no</span>')+'</div></div>'+
      '<div class="card"><div class="k">Digest algorithm</div><div class="v mono">'+esc(algo)+'</div></div>'+
      '</div>'+
      '<table class="a11ytbl intverify"><thead><tr><th>Section</th>'+
      '<th>Build digest (sha256, first 16)</th><th>Recomputed (first 16)</th>'+
      '<th>Status</th></tr></thead><tbody>'+rows+'</tbody></table>'+
      '<p class="muted">Root digest (build): <span class="mono" title="'+esc(storedRoot)+'">'+esc(storedRoot.slice(0,24))+'&hellip;</span> '+
      '&middot; recomputed: <span class="mono" title="'+esc(rec.root_digest)+'">'+esc(rec.root_digest.slice(0,24))+'&hellip;</span> '+
      '&middot; '+all.length+' sections digested; verifier runs entirely offline in the browser.</p>';
    return html;
  }

  function renderAll(){
    renderHeader(); renderOverview(); renderInventory();
    renderCalibrations(); renderCapital(); renderActions(); renderPhase24(); renderPhase25(); renderPhase26(); renderPhase27(); renderPhase28(); renderPhase29(); renderPhase30(); renderComparator(); renderDistExplorer(); renderOwnerDecision(); renderUserRun(); renderGovernance(); renderIntegrity(); renderIntegrityBanner(); renderSignoffCover(); wireDropLoader();
    wireToolbar(); a11yEnhance(); wireGlobalA11y();
    // Phase 34 Task 3 (gap H2): (re)build the search index from the just-rendered
    // DOM, then wire the search box (idempotent). Pure display layer.
    buildSearchIndex(); wireGlobalSearch();
  }

  renderTabs();
  renderAll();
  // Phase 33 Task 5 (gap G4): if the URL carries a tab hash (e.g. after a
  // reload), restore that selection now that all panels exist.
  tabFromHash();
})();
</script>
<script>
/* Phase 34 Task 5 (gap H4): CSS-only high-contrast toggle, persisted via the URL
   hash ONLY (no browser web-storage; file:// safe). The flag rides as a
   "&hc=1" suffix on the existing tab/section hash, so G4 tab routing and the H2
   deep-link "tab~section" hash are unaffected (tabFromHash strips "&..."). */
(function(){
  function hashRaw(){ return (location.hash||"").replace(/^#/,""); }
  function hcOnInHash(){ return hashRaw().split("&").indexOf("hc=1")>-1; }
  var btn=null;
  function writeHcFlag(on){
    var segs=hashRaw().split("&");
    var base=segs.shift()||"";
    var flags=segs.filter(function(f){return f && f!=="hc=1";});
    if(on) flags.unshift("hc=1");
    var out=[base].concat(flags).filter(function(s){return s!=="";}).join("&");
    try{
      if(window.history&&typeof history.replaceState==="function"){ history.replaceState(null,"","#"+out); }
      else { location.hash=out; }
    }catch(_e){ try{ location.hash=out; }catch(_e2){} }
  }
  function applyHc(on){
    document.documentElement.classList.toggle("hc", !!on);
    if(btn){ btn.setAttribute("aria-pressed", on?"true":"false");
      btn.textContent = on? "High contrast: on" : "High contrast: off"; }
  }
  btn=document.createElement("button");
  btn.id="hcToggle"; btn.type="button"; btn.className="hctoggle";
  btn.setAttribute("aria-pressed","false");
  btn.setAttribute("title","Toggle high-contrast mode (persists in the URL)");
  btn.textContent="High contrast: off";
  btn.addEventListener("click", function(){
    var on=!document.documentElement.classList.contains("hc");
    applyHc(on); writeHcFlag(on);
  });
  var host=document.querySelector("header .wrap")||document.querySelector("header")||document.body;
  host.appendChild(btn);
  applyHc(hcOnInHash());
  window.addEventListener("hashchange", function(){ applyHc(hcOnInHash()); });
})();
</script>
