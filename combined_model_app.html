<title>PAR Stochastic Model — Combined GUI (offline)</title>
<style>
  :root{ --bg:#0c0f1d; --panel:#11142a; --line:#23284a; --ink:#e8ecff; --muted:#8f96b0;
         --accent:#5b8df7; --accent2:#27c9a0; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
       display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 16px;
         background:linear-gradient(180deg,#12162e,#0c0f1d);border-bottom:1px solid var(--line)}
  .brand{font-weight:700;font-size:15px;letter-spacing:.2px}
  .brand small{display:block;font-weight:400;font-size:11px;color:var(--muted)}
  .modes{display:flex;gap:6px;margin-left:6px}
  .mode{background:#161a34;color:var(--muted);border:1px solid var(--line);border-radius:8px;
        padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer}
  .mode.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .spacer{flex:1}
  .ctl{display:flex;align-items:center;gap:8px}
  .ctl button,.ctl label{background:#161a34;color:var(--ink);border:1px solid var(--line);border-radius:8px;
        padding:6px 12px;font-size:12px;cursor:pointer}
  .ctl button:hover,.ctl label:hover{border-color:var(--accent)}
  #pill{font-size:11px;color:var(--muted)}
  #drop{font-size:11px;color:var(--muted);border:1px dashed var(--line);border-radius:8px;padding:5px 10px}
  #drop.over{border-color:var(--accent2);color:var(--ink)}
  main{flex:1;position:relative;min-height:0}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg);display:none}
  iframe.active{display:block}
  input[type=file]{display:none}
  .badge{font-size:10px;color:#0c0f1d;background:var(--accent2);border-radius:10px;padding:2px 8px;font-weight:700}
</style>
</head>
<body>
<header>

    <button onclick="reseed()">↻ Re-seed</button>
    <span id="pill"></span>
  </div>
</header>

ucational","blocking":"Pricing, MCEV","cleared":true},{"gate_id":"G-12","description":"Calibration data lineage documented (HW1F)","status":"CLEARED (educational)","level":"educational","blocking":"Capital adequacy","cleared":true}],"risk_register":[{"risk_id":"MR-001","title":"Discount rate exceeds CBIRC regulatory cap","overall_rating":"CRITICAL","mitigation_status":"MITIGATED","category":"assumption_error","owner":"Assumption Owner","likelihood":"HIGH","impact":"CRITICAL","description":"Current discount rate assumption is 3.5%, exceeding the CBIRC regulatory cap of 3.0% (effective 2023 reserve valuation guidance). This produces an understated liability reserve and overstated solvency margin.","mitigation":"Reduce discount rate to ≤3.0% in Phase 4 calibration; document deviation formally per ASOP 25 §3.3.","related_standard":"SOA ASOP 25 §3.3; CBIRC Reserve Valuation Guidance 2023","updated_at":"2026-06-04T05:28:13.393982+00:00"},{"risk_id":"MR-002","title":"Investment return assumptions overstated vs CNY market","overall_rating":"HIGH","mitigation_status":"MITIGATED","category":"assumption_error","owner":"Assumption Owner","likelihood":"HIGH","impact":"HIGH","description":"Bond return assumptions (4.0–5.0%) are 100–180 bps above current CNY government bond yields (2.2–2.6% as of calibration date). Equity ERP has not been calibrated. This systematically understates TVOG and liability PV.","mitigation":"Recalibrate bond returns and ERP to CNY market data in Phase 4 (GBMCalibrator); interim sensitivity analysis required.","related_standard":"SOA ASOP 56 §3.4; SOA ASOP 25 §3.3","updated_at":"2026-06-04T11:24:19.652316+00:00"},{"risk_id":"MR-003","title":"Dynamic lapse assumption absent","overall_rating":"CRITICAL","mitigation_status":"IN_PROGRESS","category":"model_error","owner":"Model Developer","likelihood":"MEDIUM","impact":"CRITICAL","description":"No dynamic lapse function is implemented. Dynamic lapse is the single most impactful assumption for TVOG and ALM under stressed rate scenarios. Static lapse at current flat rates will materially understate TVOG sensitivity (estimated ±15–30% TVOG per ±25% lapse shock per Phase 1 assessment).","mitigation":"Dynamic lapse implemented and calibrated (Phase 13 Task 2); ChangeRecord assumption=\"dynamic_lapse\" APPROVED.","related_standard":"SOA ASOP 7 §3.3; IA TAS M §3.5","updated_at":"2026-05-18T02:18:55.749015+00:00"},{"risk_id":"MR-004","title":"P/Q measure not enforced at runtime","overall_rating":"LOW","mitigation_status":"MITIGATED","category":"model_error","owner":"Model Developer","likelihood":"VERY_LOW","impact":"CRITICAL","description":"Prior to Phase 2, the codebase did not enforce or document the distinction between real-world (P) and risk-neutral (Q) scenario sets. Mixing measures is a critical actuarial error that invalidates both VaR/ES and TVOG outputs.","mitigation":"Measure enum implemented in esg_process.py (Phase 2). LossDistribution enforces Measure.P for VaR/ES (risk_metrics.py); TVOGEngine enforces Measure.Q (tvog.py). Phase 14 Task 1: runtime guard _enforce_simulation_measure() now validates the requested measure against each generator's declared SUPPORTED_MEASURES in every simulate()/generate() execution path (HullWhite, G2++, GBM, FX, ScenarioSet), and _assert_output_measure() verifies the output measure stamp. 30 dedicated runtime tests (tests/test_measure_enforcement.py) PASS with genuine runtime execution evidence (numpy/scipy/pandas/pytest available in automation sandbox).","related_standard":"SOA ASOP 56 §3.1.3; IA TAS M §3.4","updated_at":"2026-06-04T10:30:44+00:00"},{"risk_id":"MR-005","title":"Distributed executor pickling failure","overall_rating":"HIGH","mitigation_status":"CLOSED","category":"process_risk","owner":"Model Developer","likelihood":"HIGH","impact":"HIGH","description":"DistributedExecutor fails to serialise complex model objects for multiprocessing, causing 7 test failures in the original repository test suite. This blocks all distributed scenario execution, TVOG computation, and VaR/ES integration.","mitigation":"RESOLVED — module-level `_execute_task_spec` callable + `make_partial_task` binder; verified by 63 tests.","related_standard":"SOA ASOP 56 §3.5 (scenario adequacy requires successful batch execution)","updated_at":"2026-06-04T09:16:43.834338+00:00"},{"risk_id":"MR-006","title":"Model validation readiness below production threshold","overall_rating":"CRITICAL","mitigation_status":"IN_PROGRESS","category":"governance_risk","owner":"Assumption Owner","likelihood":"HIGH","impact":"CRITICAL","description":"Overall validation readiness assessed at 2/5 (development-grade). Stochastic validation (scenario convergence, martingale test, VaR/ES integration) is entirely absent. Model is not fit for regulatory reporting or production use in current state.","mitigation":"4-layer validation framework implementation across Phases 3–4. Full validation cadence in Phase 5.","related_standard":"SOA ASOP 56 §3.5; IA TAS M §3.6; APS X2","updated_at":"2026-05-18T02:18:55.749042+00:00"},{"risk_id":"MR-007","title":"No assumption change control process","overall_rating":"HIGH","mitigation_status":"IN_PROGRESS","category":"governance_risk","owner":"Assumption Owner","likelihood":"HIGH","impact":"HIGH","description":"The model has no documented assumption change control process. Any assumption can be changed without sign-off, impact assessment, or audit trail. This is a material IA TAS M §3.7 gap.","mitigation":"GovernanceStore + ChangeRecord + SignOffWorkflow implemented in Phase 2, Task 4 (this module). Requires organisational adoption.","related_standard":"IA TAS M §3.7; IA TAS M §3.3","updated_at":"2026-05-18T02:18:55.749049+00:00"},{"risk_id":"MR-008","title":"HW1F calibration not yet executed","overall_rating":"CRITICAL","mitigation_status":"OPEN","category":"model_error","owner":"Model Developer","likelihood":"HIGH","impact":"CRITICAL","description":"HullWhiteCalibrator.calibrate() is a NotImplementedErr r correlation because the equity maturity guarantee and rate-driven guaranteed-benefit legs lose value in the same direction under joint down-rate/down-equity stress.","mitigation":"Benchmark all aggregated figures to the multi-driver nested run; aggregate on the empirical capital-loss correlation rather than the raw ESG factor correlation; document gap in the limitation card. Educational only; not used for any capital decision.","related_standard":"SOA ASOP 56 §3.5; IA TAS M §3.6; SOA ASOP 25 §3.3","updated_at":"2026-06-05T11:35:58.078824+00:00"},{"risk_id":"MR-011","title":"Multi-driver economic-capital proxy is educational, not production capital","overall_rating":"HIGH","mitigation_status":"IN_PROGRESS","category":"model_error","owner":"Model Owner","likelihood":"MEDIUM","impact":"HIGH","description":"The Phase 15 multi-driver (short-rate + equity) nested/LSMC economic-capital proxy (Tasks 1-4) is fitted on PLACEHOLDER HW1F / GBM parameters, omits material risk drivers (lapse, mortality/longevity trend, credit spread, FX, liquidity, management action), uses an educational single-guarantee liability, and has NOT been independently reviewed (APS X2). The 99.5% VaR/ES and SCR-proxy figures it produces are illustrative only and must not be used for regulatory or internal economic-capital reporting until parameters are calibrated to credentialled market data, the omitted drivers are brought into the tail, and an independent reviewer signs off.","mitigation":"Classify all multi-driver capital output as EDUCATIONAL ONLY in the limitation card and at the API boundary; bound proxy error by the Task 2 out-of-sample validation (OOS R^2=0.9704, VaR rel err 3.21%) and outer-sampling error by the Task 4 bootstrap CI (SE ~1.66%); benchmark every aggregated figure to the Task 3 nested ground truth. Residual closure requires credentialled-data calibration + independent APS X2 review (tracked jointly with MR-006 / MR-008).","related_standard":"IA TAS M §3.6; APS X2 §3; SOA ASOP 56 §3.5","updated_at":"2026-06-04T20:15:59.122741+00:00"},{"risk_id":"MR-012","title":"Credit-spread driver and three-driver economic-capital proxy are educational, not production capital","overall_rating":"HIGH","mitigation_status":"MITIGATED","category":"model_error","owner":"Model Owner","likelihood":"MEDIUM","impact":"HIGH","description":"Phase 17 adds a CIR++ mean-reverting credit-spread driver (par_model_v2/stochastic/credit_spread.py) as the third risk factor in the nested/LSMC economic-capital proxy (rate + equity + credit-spread), with a reduced-form hazard x LGD credit-loss component on spread-sensitive backing assets. The CIR++ parameters (mean-reversion, long-run spread, vol, risk premium) and the hazard/LGD assumptions are PLACEHOLDER educational defaults, NOT calibrated to credentialled credit-market data; the trivariate LSMC surface still omits material drivers (lapse, mortality/longevity trend, FX, liquidity, management action) and has NOT been independently reviewed (APS X2). The three-driver 99.5% VaR/ES and SCR-proxy figures are illustrative only and must not be used for regulatory or internal economic-capital reporting until the credit parameters are calibrated, the omitted drivers are brought into the tail, and an independent reviewer signs off.","mitigation":"Classify all three-driver capital output as EDUCATIONAL ONLY in the consolidated limitation card and at the API boundary; bound proxy error by the Task 2 trivariate out-of-sample validation (OOS R^2=0.9751; selected basis deg1/max-int3; leakage-free) and outer-sampling error by the Task 4 three-driver bootstrap CI (VaR 150,859 with 95% CI [149,634, 152,369], SE 692 / +-0.91%); benchmark every aggregated figure to the Task 3 three-driver nested ground truth. Residual closure requires credentialled credit-data calibration + independent APS X2 review (tracked jointly with MR-006 / MR-008 / MR-011).","related_standard":"IA TAS M §3.6; APS X2 §3; SOA ASOP 56 §3.5; ASOP 25 §3.3","updated_at":"202 function b64ToUtf8(b64){
  var bin = atob(b64), bytes = new Uint8Array(bin.length);
  for (var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

var APP_DATA = JSON.parse(document.getElementById('appData').textContent);
var fProj = document.getElementById('frameProjection');
var fView = document.getElementById('frameResults');
var ready = {projection:false, results:false};

// classification + meta line
try{
  var cls = (APP_DATA.meta && APP_DATA.meta.classification) || 'EDUCATIONAL';
  document.getElementById('classBadge').textContent = (''+cls).split('--')[0].trim().slice(0,22) || 'EDUCATIONAL';
  var mn = (APP_DATA.meta && APP_DATA.meta.model_name) || 'PAR Fund';
  var mv = (APP_DATA.meta && APP_DATA.meta.model_version) || '';
  document.getElementById('metaLine').textContent = mn + (mv?(' v'+mv):'') + ' · offline · no network';
}catch(e){}

// receive readiness, then push the matching data slice
window.addEventListener('message', function(ev){
  var m = ev.data||{};
  if (m.type==='projection-ready'){ ready.projection=true; pushProjection(); }
  if (m.type==='results-ready'){ ready.results=true; pushResults(); }
});
function pushProjection(){ if(ready.projection && APP_DATA.projection)
  fProj.contentWindow.postMessage({type:'seed-projection', payload:APP_DATA.projection}, '*'); }
function pushResults(){ if(ready.results && APP_DATA.results)
  fView.contentWindow.postMessage({type:'set-results', payload:APP_DATA.results}, '*'); }

// build the iframes from the embedded sub-apps
fProj.srcdoc = b64ToUtf8(PROJ_B64);
fView.srcdoc = b64ToUtf8(VIEW_B64);

function switchMode(mode){
  var p = mode==='projection';
  fProj.classList.toggle('active', p);
  fView.classList.toggle('active', !p);
  document.getElementById('modeProjection').classList.toggle('active', p);
  document.getElementById('modeResults').classList.toggle('active', !p);
}
function reseed(){ pushProjection(); pushResults();
  document.getElementById('pill').textContent='re-seeded'; setTimeout(function(){document.getElementById('pill').textContent='';},1500); }

// ---- unified data-file loading (offline; routes to both modes) ----------
function ingest(obj){
  // accept either the unified {results,projection} or a bare viewer_data.json
  if (obj && (obj.results || obj.projection)){ APP_DATA = obj; }
  else { APP_DATA = {schema:'par-combined-app/v1', meta:obj.meta||{}, results:obj, projection:APP_DATA.projection}; }
  pushResults(); pushProjection();
  document.getElementById('drop').innerHTML = 'Loaded unified data file.';
}
function loadFile(file){
  var r = new FileReader();
  r.onload = function(){ try{ ingest(JSON.parse(r.result)); }
    catch(e){ alert('Invalid JSON: '+e.message); } };
  r.readAsText(file);
}
document.getElementById('dataFile').addEventListener('change', function(e){
  if(e.target.files[0]) loadFile(e.target.files[0]); });
var drop = document.getElementById('drop');
['dragover','dragenter'].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.add('over');}); });
['dragleave','dragend'].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.remove('over');}); });
drop.addEventListener('drop', function(e){ e.preventDefault(); drop.classList.remove('over');
  if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
// also accept drops anywhere on the window
window.addEventListener('dragover', function(e){e.preventDefault();});
window.addEventListener('drop', function(e){ e.preventDefault();
  if(e.dataTransfer && e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
</script>
