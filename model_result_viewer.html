<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAR Stochastic Model — Result Viewer (offline)</title>
<style>
  :root{
    --bg:#0f1720; --panel:#172230; --panel2:#1e2c3d; --ink:#e8eef5; --muted:#9fb1c4;
    --line:#2b3b4f; --accent:#2ecc71; --accent2:#3498db; --warn:#f39c12; --bad:#e74c3c;
    --rate:#3498db; --equity:#9b59b6; --credit:#e67e22; --lapse:#16a085; --mortality:#c0392b; --nested:#2ecc71; --formula:#f39c12;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.5;font-size:14px}
  header{padding:18px 24px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#13202e,#0f1720)}
  .headrow{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .hdrActions{display:flex;gap:8px;flex:0 0 auto}
  h1{margin:0;font-size:19px;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;vertical-align:middle}
  .b-edu{background:#3a2e0c;color:#ffd567;border:1px solid #6b5410}
  .b-pass{background:#10331f;color:#67e29a;border:1px solid #1c5e38}
  .b-warn{background:#3a2a0c;color:#ffc266;border:1px solid #6b4d10}
  .b-bad{background:#3a1212;color:#ff8a80;border:1px solid #6b1f1f}
  .wrap{max-width:1180px;margin:0 auto;padding:18px 24px 60px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:14px 0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .card .k{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.5px}
  .card .v{font-size:22px;font-weight:700;margin-top:4px}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-top:8px;flex-wrap:wrap}
  .tab{padding:9px 15px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;font-weight:600}
  .tab.active{color:var(--ink);border-bottom-color:var(--accent)}
  .view{display:none;padding-top:18px}
  .view.active{display:block}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:16px;overflow-x:auto}
  .panel h3{margin:0 0 4px;font-size:15px}
  .panel .desc{color:var(--muted);font-size:12.5px;margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
  tr:hover td{background:var(--panel2)}
  tr.sel td{background:rgba(46,204,113,.12)}
  svg{display:block;max-width:100%}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--muted)}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  select,button{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:6px 10px;font-size:13px}
  button{cursor:pointer}
  button:hover{border-color:var(--accent2)}
  .chartBox{position:relative;margin:8px 0;min-width:0}
  .chartTools{display:flex;justify-content:flex-end;gap:8px;margin:0 0 6px}
  .chartTools button{font-size:11.5px;padding:4px 8px}
  label.kk{color:var(--muted);font-size:12px}
  .pill{font-size:11px;padding:1px 8px;border-radius:999px;font-weight:600}
  .drop{border:1.5px dashed var(--line);border-radius:10px;padding:10px 14px;color:var(--muted);font-size:12.5px}
  .drop.over{border-color:var(--accent);color:var(--ink)}
  .kvs{display:grid;grid-template-columns:auto 1fr;gap:4px 16px;font-size:13px}
  .kvs .kk{color:var(--muted)}
  code{background:#0c1622;padding:1px 5px;border-radius:4px;color:#9ad0ff}
  .empty{color:var(--muted);font-style:italic;padding:8px 0}
  .gate{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .gate:last-child{border-bottom:none}
  .gate .gi{flex:0 0 auto;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px}
  .gate .gi.ok{background:#10331f;color:#67e29a;border:1px solid #1c5e38}
  .gate .gi.no{background:#3a1212;color:#ff8a80;border:1px solid #6b1f1f}
  .gate .gid{font-weight:700;flex:0 0 46px}
  .gate .gtxt{flex:1 1 auto}
  .gate .gblk{color:var(--muted);font-size:11.5px}
  .timeline{position:relative;margin:6px 0 0;padding-left:22px}
  .timeline:before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .tl{position:relative;padding:0 0 16px}
  .tl:before{content:"";position:absolute;left:-19px;top:4px;width:11px;height:11px;border-radius:50%;background:var(--accent2);border:2px solid var(--bg)}
  .tl .tlh{font-weight:600}
  .tl .tld{color:var(--muted);font-size:11.5px;margin:1px 0 4px}
  .tl .so{font-size:12px;color:var(--muted);margin:2px 0;padding-left:8px;border-left:1px dotted var(--line)}
  tr.det td{background:var(--panel2);color:var(--muted);font-size:12px}
  tr.clk{cursor:pointer}
  @media(max-width:780px){
    header{padding:14px 16px}.headrow{align-items:flex-start}.wrap{padding:14px 16px 44px}
    .row{grid-template-columns:1fr}.cards{grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:10px}
    .card .v{font-size:19px}.tabs{overflow-x:auto;flex-wrap:nowrap}.tab{white-space:nowrap;padding:9px 12px}
  }
  @media(max-width:540px){
    .headrow{display:block}.hdrActions{margin-top:10px}.panel{padding:13px 14px}
    table{min-width:620px}.drop button,.hdrActions button{margin-top:6px}
  }
  @media print{
    body{background:white;color:#111}.drop,.tabs,.hdrActions,.chartTools{display:none!important}
    .wrap{max-width:none;padding:0}.view{display:block!important}.panel,.card{break-inside:avoid;border-color:#bbb;background:white;color:#111}
    .sub,.desc,th{color:#444}
  }
</style>
</head>
<body>
<header>
  <div class="headrow">
    <div>
  <h1>PAR Stochastic Model — Result Viewer <span id="hdrClass" class="badge b-edu">EDUCATIONAL</span></h1>
  <div class="sub" id="hdrSub">offline viewer · no network required</div>
    </div>
    <div class="hdrActions"><button id="printView" type="button">Print</button></div>
  </div>
</header>
<div class="wrap">
  <div class="drop" id="drop">
    Showing embedded snapshot. Drag a <code>viewer_data.json</code> here or
    <button id="pick" type="button">choose file</button> to load another run.
    <input type="file" id="file" accept="application/json,.json" style="display:none">
  </div>
  <div class="cards" id="cards"></div>
  <div id="verdicts"></div>
  <div class="tabs" id="tabs"></div>
  <div id="views"></div>
</div>

ed. This systematically understates TVOG and liability PV.", "mitigation": "Recalibrate bond returns and ERP to CNY market data in Phase 4 (GBMCalibrator); interim sensitivity analysis required.", "related_standard": "SOA ASOP 56 §3.4; SOA ASOP 25 §3.3", "updated_at": "2026-06-04T11:24:19.652316+00:00"}, {"risk_id": "MR-003", "title": "Dynamic lapse assumption absent", "overall_rating": "CRITICAL", "mitigation_status": "IN_PROGRESS", "category": "model_error", "owner": "Model Developer", "likelihood": "MEDIUM", "impact": "CRITICAL", "description": "No dynamic lapse function is implemented. Dynamic lapse is the single most impactful assumption for TVOG and ALM under stressed rate scenarios. Static lapse at current flat rates will materially understate TVOG sensitivity (estimated ±15–30% TVOG per ±25% lapse shock per Phase 1 assessment).", "mitigation": "Dynamic lapse implemented and calibrated (Phase 13 Task 2); ChangeRecord assumption=\"dynamic_lapse\" APPROVED.", "related_standard": "SOA ASOP 7 §3.3; IA TAS M §3.5", "updated_at": "2026-05-18T02:18:55.749015+00:00"}, {"risk_id": "MR-004", "title": "P/Q measure not enforced at runtime", "overall_rating": "LOW", "mitigation_status": "MITIGATED", "category": "model_error", "owner": "Model Developer", "likelihood": "VERY_LOW", "impact": "CRITICAL", "description": "Prior to Phase 2, the codebase did not enforce or document the distinction between real-world (P) and risk-neutral (Q) scenario sets. Mixing measures is a critical actuarial error that invalidates both VaR/ES and TVOG outputs.", "mitigation": "Measure enum implemented in esg_process.py (Phase 2). LossDistribution enforces Measure.P for VaR/ES (risk_metrics.py); TVOGEngine enforces Measure.Q (tvog.py). Phase 14 Task 1: runtime guard _enforce_simulation_measure() now validates the requested measure against each generator's declared SUPPORTED_MEASURES in every simulate()/generate() execution path (HullWhite, G2++, GBM, FX, ScenarioSet), and _assert_output_measure ry or internal economic-capital reporting until the credit parameters are calibrated, the omitted drivers are brought into the tail, and an independent reviewer signs off.", "mitigation": "Classify all three-driver capital output as EDUCATIONAL ONLY in the consolidated limitation card and at the API boundary; bound proxy error by the Task 2 trivariate out-of-sample validation (OOS R^2=0.9751; selected basis deg1/max-int3; leakage-free) and outer-sampling error by the Task 4 three-driver bootstrap CI (VaR 150,859 with 95% CI [149,634, 152,369], SE 692 / +-0.91%); benchmark every aggregated figure to the Task 3 three-driver nested ground truth. Residual closure requires credentialled credit-data calibration + independent APS X2 review (tracked jointly with MR-006 / MR-008 / MR-011).", "related_standard": "IA TAS M §3.6; APS X2 §3; SOA ASOP 56 §3.5; ASOP 25 §3.3", "updated_at": "2026-06-05T11:35:58.079068+00:00"}]}};

function barChart(items, opt={}){
  const W=opt.w||520,H=opt.h||230,pad={l:48,r:14,t:14,b:54};
  const vf=opt.vfmt||(v=>fmt(v));
  const max=Math.max(1e-9,...items.map(d=>d.v||0));
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b, bw=iw/items.length;
  let s=`<svg viewBox="0 0 ${W} ${H}" role="img">`;
  for(let g=0;g<=4;g++){const y=pad.t+ih*g/4;const val=max*(1-g/4);
    s+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#2b3b4f" stroke-width="1"/>`;
    s+=`<text x="${pad.l-6}" y="${y+3}" fill="#9fb1c4" font-size="10" text-anchor="end">${vf(val)}</text>`;}
  items.forEach((d,i)=>{const h=ih*(d.v||0)/max;const x=pad.l+i*bw+bw*0.18;const y=pad.t+ih-h;const w=bw*0.64;
    s+=`<rect x="${x}" y="${y}" width="${w}" height="${Math.max(0,h)}" rx="3" fill="${d.c||'#3498db'}"><title>${esc(d.label)}: ${vf(d.v)}</title></rect>`;
    s+=`<text x="${x+w/2}" y="${y-5}" fill="#e8eef5" font-size="10.5" text-anchor="middle">${vf(d.v)}</text>`;
    s+=`<text x="${x+w/2}" y="${H-pad.b+15}" fill="#9fb1c4" font-size="10.5" text-anchor="middle">${esc(d.label)}</text>`;});
  return s+`</svg>`;
}
// waterfall: steps [{label,start,end,c,kind:'abs'|'delta'}] — bars float between start and end; dashed connectors
function waterfallChart(steps, opt={}){
  const W=opt.w||600,H=opt.h||280,pad={l:62,r:14,t:20,b:58};
  const vals=steps.flatMap(d=>[d.start,d.end]).filter(v=>v!=null&&!isNaN(v));
  const max=Math.max(1,...vals);
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b, bw=iw/steps.length;
  const Y=v=> pad.t+ih*(1-v/max);
  let s=`<svg viewBox="0 0 ${W} ${H}" role="img">`;
  for(let g=0;g<=4;g++){const y=pad.t+ih*g/4;const val=max*(1-g/4);
    s+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#2b3b4f"/>`;
    s+=`<text x="${pad.l-6}" y="${y+3}" fill="#9fb1c4" font-size="10" text-anchor="end">${fmt(val)}</text>`;}
  steps.forEach((d,i)=>{const x=pad.l+i*bw+bw*0.18, w=bw*0.64;
    const yA=Y(d.start), yB=Y(d.end), top=Math.min(yA,yB), h=Math.max(1,Math.abs(yA-yB));
    const delta=d.end-d.start;
    const tip=d.kind==='delta'?((delta>=0?'+':'')+fmt(delta)+'  →  '+fmt(d.end)):fmt(d.end);
    s+=`<rect x="${x}" y="${top}" width="${w}" height="${h}" rx="3" fill="${d.c}"><title>${esc(d.label)}: ${tip}</title></rect>`;
    const lbl=d.kind==='delta'?((delta>=0?'+':'')+fmt(delta)):fmt(d.end);
    s+=`<text x="${x+w/2}" y="${top-5}" fill="#e8eef5" font-size="10.5" text-anchor="middle">${lbl}</text>`;
    s+=`<text x="${x+w/2}" y="${H-pad.b+15}" fill="#9fb1c4" font-size="10.5" text-anchor="middle">${esc(d.label)}</text>`;
    if(i<steps.length-1){const nx=pad.l+(i+1)*bw+bw*0.18;s+=`<line x1="${x+w}" y1="${Y(d.end)}" x2="${nx}" y2="${Y(d.end)}" stroke="#5a6b7d" stroke-dasharray="3 3"/>`;}
  });
  return s+`</svg>`;
}
function lineChart(series, xlabels, opt={}){
  // series: [{name,color,vals:[..],dashed?}]
  const W=opt.w||520,H=opt.h||240,pad={l:50,r:14,t:14,b:46};
  const all=series.flatMap(s=>s.vals).filter(v=>v!=null&&!isNaN(v));
  let lo=opt.min!=null?opt.min:Math.min(...all), hi=opt.max!=null?opt.max:Math.max(...all);
  if(opt.band){opt.band.forEach(arr=>arr.forEach(v=>{if(v!=null&&!isNaN(v)){lo=Math.min(lo,v);hi=Math.max(hi,v);}}));}
  if(lo===hi){hi=lo+1;lo=lo-1;} const rng=hi-lo;
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b, n=xlabels.length;
  const X=i=> pad.l + (n<=1?iw/2:iw*i/(n-1));
  const Y=v=> pad.t + ih*(1-(v-lo)/rng);
  let s=`<svg viewBox="0 0 ${W} ${H}" role="img">`;
  for(let g=0;g<=4;g++){const y=pad.t+ih*g/4;const val=hi-rng*g/4;
    s+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#2b3b4f"/>`;
    s+=`<text x="${pad.l-6}" y="${y+3}" fill="#9fb1c4" font-size="10" text-anchor="end">${opt.yfmt?opt.yfmt(val):fmt(val)}</text>`;}
  xlabels.forEach((lb,i)=> s+=`<text x="${X(i)}" y="${H-pad.b+16}" fill="#9fb1c4" font-size="10.5" text-anchor="middle">${esc(lb)}</text>`);
  if(opt.band){ // [loArr,hiArr]
    const [bl,bh]=opt.band; let up="",dn="";
    bl.forEach((v,i)=>up+=`${i?'L':'M'}${X(i)},${Y(bh[i])} `); for(let i=bl.length-1;i>=0;i--)dn+=`L${X(i)},${Y(bl[i])} `;
    s+=`<path d="${up}${dn}Z" fill="${opt.bandColor||'#3498db'}" opacity="0.15"/>`;
  }
  series.forEach(se=>{let p="";se.vals.forEach((v,i)=>{if(v==null||isNaN(v))return;p+=`${p?'L':'M'}${X(i)},${Y(v)} `;});
    s+=`<path d="${p}" fill="none" stroke="${se.color}" stroke-width="2.2" ${se.dashed?'stroke-dasharray="5 4"':''}/>`;
    se.vals.forEach((v,i)=>{if(v==null||isNaN(v))return;s+=`<circle cx="${X(i)}" cy="${Y(v)}" r="3" fill="${se.color}"><title>${esc(se.name)} @ ${esc(xlabels[i])}: ${opt.yfmt?opt.yfmt(v):fmt(v,4)}</title></circle>`;});
  });
  return s+`</svg>`;
}

// ---------- chart export / print (offline, canvas only) ----------
function cssVarValue(v){
  const m=String(v||"").match(/^var\((--[^)]+)\)$/);
  return m?getComputedStyle(document.documentElement).getPropertyValue(m[1]).trim():v;
}
function prepareSvgForCanvas(svg){
  const clone=svg.cloneNode(true);
  clone.setAttribute("xmlns","http:"+"//www.w3.org/2000/svg");
  const vb=(clone.getAttribute("viewBox")||"").split(/\s+/).map(Number);
  const w=Number(clone.getAttribute("width"))||(vb.length===4?vb[2]:560);
  const h=Number(clone.getAttribute("height"))||(vb.length===4?vb[3]:260);
  clone.setAttribute("width",String(w));
  clone.setAttribute("height",String(h));
  clone.querySelectorAll("*").forEach(el=>{
    ["fill","stroke"].forEach(a=>{const val=el.getAttribute(a);if(val&&val.indexOf("var(")===0)el.setAttribute(a,cssVarValue(val));});
  });
  return {clone,w,h};
}
function chartExportName(svg){
  const h=svg.closest(".panel")&&svg.closest(".panel").querySelector("h3");
  return ((h&&h.textContent)||"model-chart").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,80)||"model-chart";
}
function exportSvgToPng(svg,name){
  const {clone,w,h}=prepareSvgForCanvas(svg);
  const xml=new XMLSerializer().serializeToString(clone);
  const url=URL.createObjectURL(new Blob([xml],{type:"image/svg+xml;charset=utf-8"}));
  const img=new Image();
  img.onload=()=>{
    const scale=2;
    const canvas=document.createElement("canvas");
    canvas.width=Math.max(1,Math.round(w*scale)); canvas.height=Math.max(1,Math.round(h*scale));
    const ctx=canvas.getContext("2d");
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue("--panel").trim()||"#172230";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    URL.revokeObjectURL(url);
    const save=blob=>{
      const a=document.createElement("a");
      a.download=(name||chartExportName(svg))+".png";
      a.href=blob?URL.createObjectURL(blob):canvas.toDataURL("image/png");
      document.body.appendChild(a); a.click(); a.remove();
      if(blob)setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    };
    if(canvas.toBlob)canvas.toBlob(save,"image/png"); else save(null);
  };
  img.onerror=()=>{URL.revokeObjectURL(url); alert("Chart export failed.");};
  img.src=url;
}
function enhanceChartExports(){
  document.querySelectorAll(".panel svg").forEach(svg=>{
    if(svg.dataset.exportReady==="1")return;
    svg.dataset.exportReady="1";
    const box=document.createElement("div"); box.className="chartBox";
    const tools=document.createElement("div"); tools.className="chartTools";
    const btn=document.createElement("button"); btn.type="button"; btn.textContent="Export PNG";
    btn.onclick=()=>exportSvgToPng(svg,chartExportName(svg));
    tools.appendChild(btn);
    svg.parentNode.insertBefore(box,svg);
    box.appendChild(tools); box.appendChild(svg);
  });
}

// loss-distribution histogram with vertical threshold markers (no dependency)
function histChart(hist, markers, opt={}){
  const W=opt.w||560,H=opt.h||260,pad={l:48,r:14,t:14,b:46};
  const edges=(hist&&hist.bin_edges)||[], counts=(hist&&hist.counts)||[];
  if(edges.length<2||!counts.length) return '<div class="empty">No loss-distribution data loaded.</div>';
  const lo=edges[0], hi=edges[edges.length-1], rng=(hi-lo)||1;
  const maxc=Math.max(1,...counts);
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  const X=v=> pad.l + iw*(v-lo)/rng;
  const Yc=c=> pad.t + ih*(1-c/maxc);
  let s=`<svg viewBox="0 0 ${W} ${H}" role="img">`;
  for(let g=0;g<=4;g++){const y=pad.t+ih*g/4;const val=maxc*(1-g/4);
    s+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#2b3b4f"/>`;
    s+=`<text x="${pad.l-6}" y="${y+3}" fill="#9fb1c4" font-size="10" text-anchor="end">${fmt(val)}</text>`;}
  counts.forEach((c,i)=>{const x0=X(edges[i]),x1=X(edges[i+1]);const y=Yc(c);
    s+=`<rect x="${x0}" y="${y}" width="${Math.max(0.5,x1-x0-0.6)}" height="${pad.t+ih-y}" fill="#3b6ea5" opacity="0.85"><title>[${fmt(edges[i])}, ${fmt(edges[i+1])}): ${fmt(c)}</title></rect>`;});
  for(let g=0;g<=5;g++){const v=lo+rng*g/5;const x=X(v);
    s+=`<text x="${x}" y="${H-pad.b+16}" fill="#9fb1c4" font-size="10" text-anchor="middle">${fmt(v)}</text>`;}
  (markers||[]).forEach(mk=>{if(mk.x==null||isNaN(mk.x))return;const x=X(mk.x);
    s+=`<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${pad.t+ih}" stroke="${mk.color}" stroke-width="2" ${mk.dashed?'stroke-dasharray="5 4"':''}><title>${esc(mk.label)}: ${fmt(mk.x)}</title></line>`;
    s+=`<text x="${x>W-90?x-4:x+4}" y="${pad.t+10}" fill="${mk.color}" font-size="10" text-anchor="${x>W-90?'end':'start'}">${esc(mk.tag||'')}</text>`;});
  return s+`</svg>`;
}
// horizontal point + CI band rows (bootstrap CI)
function ciBar(rows, opt={}){
  const W=opt.w||520,H=opt.h||140,pad={l:60,r:20,t:18,b:34};
  const all=rows.flatMap(r=>[r.lo,r.hi,r.point]).filter(v=>v!=null&&!isNaN(v));
  if(!all.length) return '<div class="empty">No bootstrap-CI data loaded.</div>';
  let lo=Math.min(...all), hi=Math.max(...all); const pdg=(hi-lo)*0.12||1; lo-=pdg; hi+=pdg; const rng=hi-lo;
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  const X=v=> pad.l+iw*(v-lo)/rng;
  const rh=ih/rows.length;
  let s=`<svg viewBox="0 0 ${W} ${H}" role="img">`;
  for(let g=0;g<=4;g++){const v=lo+rng*g/4;const x=X(v);
    s+=`<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${pad.t+ih}" stroke="#2b3b4f"/>`;
    s+=`<text x="${x}" y="${H-pad.b+16}" fill="#9fb1c4" font-size="10" text-anchor="middle">${fmt(v)}</text>`;}
  rows.forEach((r,i)=>{const cy=pad.t+rh*(i+0.5);const c=r.color||'#3498db';
    s+=`<text x="${pad.l-8}" y="${cy+4}" fill="#e8eef5" font-size="12" text-anchor="end">${esc(r.label)}</text>`;
    if(r.lo!=null&&r.hi!=null){s+=`<rect x="${X(r.lo)}" y="${cy-7}" width="${Math.max(1,X(r.hi)-X(r.lo))}" height="14" rx="3" fill="${c}" opacity="0.22"/>`;
      s+=`<line x1="${X(r.lo)}" y1="${cy-7}" x2="${X(r.lo)}" y2="${cy+7}" stroke="${c}"/><line x1="${X(r.hi)}" y1="${cy-7}" x2="${X(r.hi)}" y2="${cy+7}" stroke="${c}"/>`;}
    if(r.point!=null){s+=`<circle cx="${X(r.point)}" cy="${cy}" r="4" fill="${c}"><title>${esc(r.label)} ${fmt(r.point)} (95% CI [${fmt(r.lo)}, ${fmt(r.hi)}])</title></circle>`;}
  });
  return s+`</svg>`;
}

        ${ciBar([{label:'VaR',point:t.var_point||t.final_var,lo:vlo,hi:vhi,color:'#3498db'},{label:'ES',point:t.es_point||t.final_es,lo:t.es_ci&&t.es_ci[0],hi:t.es_ci&&t.es_ci[1],color:'#2ecc71'}],{w:500,h:130})}
        <div class="kvs" style="margin-top:8px">
          <span class="kk">VaR std error</span><span>${fmt(t.var_se)}</span>
          <span class="kk">Sobol QMC var-reduction</span><span>${t.sobol_ratio?fmt(t.sobol_ratio,2)+"×":"—"}</span>
          <span class="kk">Antithetic var-reduction</span><span>${t.antithetic_ratio?fmt(t.antithetic_ratio,2)+"×":"—"}</span>
        </div></div></div>`;
  }
  return html;
}

function renderLossPanel(d){
  const L=(d&&d.loss)||{}; const chart=document.getElementById('lossChart'); if(!chart)return;
  const seeds=(L.seeds&&L.seeds.length)?L.seeds:[{seed:L.seed_base,histogram:L.histogram,confidence_sweep:L.confidence_sweep,percentiles:L.percentiles,mean_liability:L.mean_liability}];
  const elS=document.getElementById('lossSeed'),elC=document.getElementById('lossCl'),elP=document.getElementById('lossPct');
  const draw=()=>{
    const sb=seeds[Math.max(0,+((elS&&elS.value)||0))]||seeds[0];
    const sweep=sb.confidence_sweep||L.confidence_sweep||[];
    const pcts=sb.percentiles||L.percentiles||[];
    const cr=sweep[Math.max(0,+((elC&&elC.value)||0))]||sweep[sweep.length-1]||{};
    const pr=pcts[Math.max(0,+((elP&&elP.value)||0))]||{};
    const mean=sb.mean_liability!=null?sb.mean_liability:L.mean_liability;
    const markers=[
      {x:mean,color:'#9fb1c4',label:'mean',tag:'mean'},
      {x:cr.var,color:'#e74c3c',label:'VaR '+pct(cr.cl,1),tag:'VaR'},
      {x:cr.es,color:'#f39c12',dashed:true,label:'ES '+pct(cr.cl,1),tag:'ES'},
      {x:pr.loss,color:'#3498db',dashed:true,label:'p'+pct(pr.p,1),tag:'p'+pct(pr.p,1)},
    ];
    chart.innerHTML=histChart(sb.histogram||L.histogram,markers,{w:580,h:270});
    const kv=document.getElementById('lossKvs');
    if(kv)kv.innerHTML=`
      <span class="kk">Mean liability</span><span>${fmt(mean)}</span>
      <span class="kk">VaR @ ${pct(cr.cl,1)}</span><span>${fmt(cr.var)}</span>
      <span class="kk">ES @ ${pct(cr.cl,1)}</span><span>${fmt(cr.es)}</span>
      <span class="kk">SCR-proxy @ ${pct(cr.cl,1)}</span><span>${fmt(cr.scr)}</span>
      <span class="kk">Loss @ ${pct(pr.p,1)} percentile</span><span>${fmt(pr.loss)}</span>`;
    setTimeout(enhanceChartExports,0);
  };
  [elS,elC,elP].forEach(e=>e&&(e.onchange=draw)); draw();
}

function viewProxy(d){
  const p=d.proxy||{};
  if(!p.degree_rows||!p.degree_rows.length) return `<div class="panel"><div class="empty">No proxy-validation data loaded.</div></div>`;
  const xl=p.degree_rows.map(r=>"deg "+r.degree);
  const inS=p.degree_rows.map(r=>r.in_sample_r2), oos=p.degree_rows.map(r=>r.oos_r2);
  const gaps=p.degree_rows.map(r=>(r.in_sample_r2!=null&&r.oos_r2!=null)?(r.in_sample_r2-r.oos_r2):null);
  const onset=p.overfit_onset_degree;
  const gapBars=p.degree_rows.map((r,i)=>({label:'deg '+r.degree,v:gaps[i]!=null?Math.max(0,gaps[i]):0,
    c:(onset!=null&&r.degree>=onset)?'var(--bad)':'var(--accent)'}));
  const selGap=(()=>{const r=p.degree_rows.find(x=>x.degree===p.selected_degree);return r&&r.in_sample_r2!=null&&r.oos_r2!=null?r.in_sample_r2-r.oos_r2:null;})();
  return `<div class="panel"><h3>Out-of-sample proxy fit — basis-degree sweep</h3>
    <div class="desc">In-sample (heavy) vs out-of-sample R² across polynomial degrees. Selected degree <strong>${fmt(p.selected_degree)}</strong> (by ${esc(p.selection_metric||'OOS error')}); overfit onset at degree ${fmt(p.overfit_onset_degree)}. Higher in-sample with falling OOS is the overfit signature.</div>
    ${lineChart([{name:'in-sample R²',color:'#f39c12',vals:inS},{name:'OOS R²',color:'#2ecc71',vals:oos}],xl,{w:560,h:240,min:Math.min(0.8,...oos.filter(x=>x!=null))-0.02,max:1.0,yfmt:v=>v.toFixed(2)})}
    ${legend([{c:'#f39c12',t:'in-sample R² (heavy)'},{c:'#2ecc71',t:'out-of-sample R²'}])}
    <div class="kvs" style="margin-top:12px">
      <span class="kk">Selected-degree overfit gap</span><span>${selGap!=null?selGap.toFixed(4):'—'}</span>
      <span class="kk">Selected-degree VaR rel. error</span><span>${pct(p.var_rel_error,2)}</span>
      <span class="kk">Selected-degree ES rel. error</span><span>${pct(p.es_rel_error,2)}</span>
    </div>
    <table style="margin-top:14px"><thead><tr><th>Degree</th><th>Basis terms</th><th>In-sample R²</th><th>OOS R²</th><th>Overfit gap</th><th>OOS max abs rel err</th></tr></thead>
    <tbody>${p.degree_rows.map((r,i)=>`<tr><td>${fmt(r.degree)}${r.degree===p.selected_degree?' <span class="pill b-pass">selected</span>':''}${(onset!=null&&r.degree===onset)?' <span class="pill b-warn">onset</span>':''}</td><td>${fmt(r.n_basis_terms)}</td><td>${r.in_sample_r2!=null?r.in_sample_r2.toFixed(4):'—'}</td><td>${r.oos_r2!=null?r.oos_r2.toFixed(4):'—'}</td><td>${gaps[i]!=null?gaps[i].toFixed(4):'—'}</td><td>${pct(r.oos_max_abs_rel_error,2)}</td></tr>`).join("")}</tbody></table></div>
    <div class="panel"><h3>Overfit gap (in-sample − OOS R²) by degree</h3>
    <div class="desc">The generalisation gap widens past the overfit onset (degree ${fmt(onset)}): green ≤ onset, red ≥ onset. A small, stable gap at the selected degree is the proxy-validation signal (IA TAS M §3.6; SOA ASOP 56 §3.5).</div>
    ${barChart(gapBars,{w:560,h:210,vfmt:v=>v.toFixed(3)})}
    ${legend([{c:'#2ecc71',t:'≤ overfit onset'},{c:'#e74c3c',t:'≥ overfit onset'}])}</div>`;
}

function viewAggregation(d){
  const c=d.capital||{};
  if(c.standalone_sum==null||c.nested_scr==null||c.correlated_scr==null)
    return `<div class="panel"><div class="empty">No risk-aggregation data loaded.</div></div>`;
  const steps=[
    {label:'Σ standalone',start:0,end:c.standalone_sum,c:'#7f8c8d',kind:'abs'},
    {label:'Diversif.',start:c.standalone_sum,end:c.correlated_scr,c:'var(--accent)',kind:'delta'},
    {label:'Var-cov',start:0,end:c.correlated_scr,c:'var(--formula)',kind:'abs'},
    {label:'Correction',start:c.correlated_scr,end:c.nested_scr,c:'var(--bad)',kind:'delta'},
    {label:'Nested',start:0,end:c.nested_scr,c:'var(--nested)',kind:'abs'},
  ];
  const understated=c.correlated_scr<c.nested_scr;
  const hasCredit=c.credit_scr!=null;
  const drivers=(c.drivers&&c.drivers.length)?c.drivers:(hasCredit?["short_rate","equity","credit_spread"]:["short_rate","equity"]);
  const nDrv=drivers.length;
  const understatePct=(c.esg_understatement_pct!=null)?c.esg_understatement_pct:c.formula_vs_nested_rel_error;
  const offdiag=(m)=>{const o=[];for(let i=0;i<m.length;i++)for(let j=i+1;j<m.length;j++)o.push(fmt(m[i][j],2));return o.join(' / ');};
  const corrText=(nDrv>=4&&c.esg_correlation_matrix)
    ?`the governed ${nDrv}×${nDrv} ESG driver correlation (off-diagonals ${offdiag(c.esg_correlation_matrix)}; the behavioural lapse index is orthogonal to the financial drivers)`
    :hasCredit
    ?`the governed 3×3 ESG driver correlation (rate/equity/credit off-diagonals ${(c.esg_correlation_matrix?[c.esg_correlation_matrix[0][1],c.esg_correlation_matrix[0][2],c.esg_correlation_matrix[1][2]].map(x=>fmt(x,2)).join(' / '):fmt(c.esg_rate_equity_correlation,2))})`
    :`the governed ESG rate/equity correlation (ρ=${fmt(c.esg_rate_equity_correlation,2)})`;
  const wf=`<div class="panel"><h3>Diversification-benefit waterfall — standalone → var-cov → nested (${pct(c.confidence_level,1)})</h3>
    <div class="desc">From the sum of <strong>${nDrv} standalone driver SCR</strong>${hasCredit?' (rate + equity-guarantee + credit-loss)':' (rate + equity-guarantee)'}, the variance–covariance step applies ${corrText} to claim a diversification benefit; the final step corrects to the fully-diversified nested benchmark. Hover any bar for the step value.</div>
    ${waterfallChart(steps,{w:600,h:285})}
    ${legend([{c:'#7f8c8d',t:'standalone / aggregate level'},{c:'#2ecc71',t:'diversification reduction'},{c:'#e74c3c',t:'correlation correction'},{c:'var(--nested)',t:'nested benchmark'}])}
    <div class="row" style="margin-top:14px">
      <div class="kvs">
        <span class="kk">Σ standalone SCR</span><span>${fmt(c.standalone_sum)}</span>
        <span class="kk">Var-cov SCR (ESG ρ)</span><span>${fmt(c.correlated_scr)}</span>
        <span class="kk">Nested SCR (benchmark)</span><span>${fmt(c.nested_scr)}</span>
        <span class="kk">Diversification benefit — formula</span><span>${fmt(c.diversification_benefit_formula)}</span>
        <span class="kk">Diversification benefit — nested</span><span>${fmt(c.diversification_benefit_nested)}</span>
      </div>
      <div class="kvs">
        <span class="kk">Var-cov vs nested rel. error</span><span><span class="pill ${c.formula_vs_nested_rel_error>0.1?'b-warn':'b-pass'}">${pct(c.formula_vs_nested_rel_error,1)}</span></span>
        <span class="kk">ESG factor correlation</span><span>${fmt(c.esg_rate_equity_correlation,2)}</span>
        <span class="kk">Realised loss correlation</span><span>${fmt(c.component_loss_correlation,3)}</span>
      </div>
    </div>
    <div class="desc" style="margin-top:12px;border-top:1px solid var(--line);padding-top:10px">
      <strong>Key finding (MR-010, MITIGATED):</strong> the raw ESG factor correlation ${understated?'understates':'misstates'} diversified ${nDrv}-driver capital by ${pct(understatePct,1)}${hasCredit?' (vs ~32.9% with two drivers — adding credit widens the gap)':''}. The realised capital-loss correlation is +${fmt(c.component_loss_correlation,2)} (mean off-diagonal)${hasCredit?'; pairwise losses (rate-eq / rate-cr / eq-cr) all co-move positively in stress even though the ESG factor off-diagonals are negative':''}, so the variance–covariance formula overstates the diversification benefit relative to the nested ground truth and is non-conservative. Use the nested benchmark for the headline capital figure (SOA ASOP 56 §3.5; ASOP 25 §3.3; IA TAS M §3.2/§3.6).
    </div></div>`;
  // Phase 18 copula / tail-dependence aggregation panel
  let copulaHtml='';
  const cop=c.copula;
  if(cop&&cop.candidates&&cop.candidates.length){
    const rows=cop.candidates.map(k=>{
      const sel=(k.name===cop.selected);
      return `<tr${sel?' class="sel"':''}><td>${esc(k.name)}${sel?' <span class="pill b-pass">selected</span>':''}</td>`+
        `<td>${fmt(k.aggregated_scr)}</td>`+
        `<td><span class="pill ${(k.scr_rel_error_vs_nested!=null&&k.scr_rel_error_vs_nested<0.1)?'b-pass':'b-warn'}">${pct(k.scr_rel_error_vs_nested,1)}</span></td>`+
        `<td>${fmt(k.upper_tail_dependence,3)}</td>`+
        `<td>${fmt(k.diversification_benefit)}</td>`+
        `<td>${fmt(k.aic,1)}</td></tr>`;
    }).join("");
    copulaHtml=`<div class="panel"><h3>Tail-dependent (copula) aggregation — MR-010 mitigation</h3>
      <div class="desc">The Gaussian variance–covariance formula reconciles to the nested benchmark with a <strong>${pct(cop.var_covar_rel_error_vs_nested,1)}</strong> SCR error. Fitting a copula to the realised outer-state losses and re-aggregating against empirical marginals reconciles the diversified ${nDrv}-driver SCR to the nested ground truth far more tightly. The viewer performs no calculation — every figure is a pre-computed model output (selected copula: <strong>${esc(cop.selected)}</strong>). Upper tail dependence λ_U &gt; 0 means joint extreme losses cluster beyond the Gaussian-formula assumption (Demarta–McNeil 2005; Solvency II Delegated Reg. Art. 234).</div>
      <table><thead><tr><th>Copula</th><th>Aggregated SCR</th><th>Rel. err vs nested</th><th>Upper tail dep. λ_U</th><th>Diversif. benefit</th><th>AIC</th></tr></thead><tbody>${rows}</tbody></table>
      <div class="kvs" style="margin-top:12px">
        <span class="kk">Var-cov SCR</span><span>${fmt(cop.var_covar_scr)}</span>
        <span class="kk">Var-cov rel. err vs nested</span><span><span class="pill ${cop.var_covar_rel_error_vs_nested>0.1?'b-warn':'b-pass'}">${pct(cop.var_covar_rel_error_vs_nested,1)}</span></span>
        <span class="kk">Nested SCR (benchmark)</span><span>${fmt(cop.nested_scr)}</span>
      </div>
      <div class="desc" style="margin-top:10px">Selection is by AIC across the fitted copula family; the selected copula's SCR is the recommended tail-dependent aggregate. Copulas fitted to a finite outer sample carry sampling noise and empirical marginals do not extrapolate — credentialled calibration + independent APS X2 review remain the production residual.</div>
    </div>`;
  }
  return wf+copulaHtml;
}

function viewGov(d){
  const g=d.governance||{};
  const cr=g.change_records||[];
  const gates=g.deployment_gates||[];
  const cleared=gates.filter(x=>x.cleared).length;
  const statusOpts=['ALL','OPEN','IN_PROGRESS','MITIGATED','CLOSED','ACCEPTED'].map(o=>`<option>${o}</option>`).join("");
  const ratingOpts=['ALL','VERY_LOW','LOW','MEDIUM','HIGH','VERY_HIGH','CRITICAL'].map(o=>`<option>${o}</option>`).join("");
  const gatesHtml=gates.length?`<div class="panel"><h3>Deployment-gate checklist</h3>
    <div class="desc"><span class="pill b-pass">${cleared} / ${gates.length} cleared</span> at educational level. Production residual: credentialled live market data + an independent APS X2 reviewer. Source: DEPLOYMENT_READINESS_CHECKLIST.md.</div>
    ${gates.map(x=>`<div class="gate"><span class="gi ${x.cleared?'ok':'no'}">${x.cleared?'\u2713':'\u2715'}</span><span class="gid">${esc(x.gate_id)}</span><span class="gtxt">${esc(x.description)} <span class="pill ${x.cleared?'b-pass':'b-bad'}">${esc(x.status)}</span><div class="gblk">Blocking: ${esc(x.blocking)}</div></span></div>`).join("")}</div>`:"";
  const integ=g.audit_integrity_ok;
  const rrHtml=`<div class="panel"><h3>Model risk register</h3>
    <div class="desc">Audit entries: ${fmt(g.audit_entries)} <span class="pill ${integ?'b-pass':'b-bad'}">integrity ${integ?'OK':'FAIL'}${g.audit_verified!=null?' \u00b7 '+g.audit_verified+'/'+g.audit_entries+' digests verified':''}</span>
    &nbsp; Status <select id="rrStatus">${statusOpts}</select> &nbsp; Rating <select id="rrRating">${ratingOpts}</select></div>
    <table id="rrTable"><thead><tr><th>ID</th><th>Title</th><th>Category</th><th>Rating</th><th>Status</th></tr></thead><tbody></tbody></table>
    <div class="desc" style="margin-top:8px">Click a row to expand its description and mitigation. Digest integrity is recomputed at build time (SHA-256 over each audit entry).</div></div>`;
  const tl=cr.slice().sort((a,b)=>String(a.created_at).localeCompare(String(b.created_at)));
  const tlHtml=`<div class="panel"><h3>Change-record timeline (IA TAS M \u00a73.7)</h3>
    <div class="desc">${cr.length} change record${cr.length===1?'':'s'} in chronological order; each shows its sign-off history (peer review \u2192 owner review \u2192 approval).</div>
    ${cr.length?`<div class="timeline">${tl.map(r=>`<div class="tl">
      <div class="tlh">${esc((r.created_at||'').slice(0,10))} \u2014 ${esc(r.title)} <span class="pill ${vClass(r.status==='APPROVED'?'PASS':r.status==='OWNER_REVIEW'?'PARTIAL':r.status==='REJECTED'?'FAIL':'')}">${esc(r.status)}</span></div>
      <div class="tld">${esc(r.change_type)}${r.phase?' \u00b7 '+esc(r.phase):''}${r.author?' \u00b7 '+esc(r.author):''}</div>
      ${(r.sign_off_history||[]).map(so=>`<div class="so"><strong>${esc(so.status)}</strong> \u2014 ${esc((so.comments||'').slice(0,180))}</div>`).join("")}
    </div>`).join("")}</div>`:'<div class="empty">No change records loaded.</div>'}</div>`;
  return gatesHtml+rrHtml+tlHtml;
}

function fillRiskRegister(d){
  const g=(d&&d.governance)||{}; const rr=g.risk_register||[];
  const tb=document.querySelector('#rrTable tbody');
  const selS=document.getElementById('rrStatus'), selR=document.getElementById('rrRating');
  if(!tb||!selS||!selR)return;
  const fill=()=>{const fs=selS.value, fr=selR.value;
    const rows=rr.filter(r=>(fs==='ALL'||r.mitigation_status===fs)&&(fr==='ALL'||r.overall_rating===fr));
    tb.innerHTML=rows.map((r,i)=>
      `<tr class="clk" data-i="${i}"><td>${esc(r.risk_id)}</td><td>${esc(r.title)}</td><td>${esc(r.category||'\u2014')}</td><td><span class="pill ${ratingClass(r.overall_rating)}">${esc(r.overall_rating)}</span></td><td><span class="pill ${statusClass(r.mitigation_status)}">${esc(r.mitigation_status)}</span></td></tr>`+
      `<tr class="det" id="det-${i}" style="display:none"><td colspan="5"><strong>Owner:</strong> ${esc(r.owner||'\u2014')} \u00b7 <strong>Likelihood/Impact:</strong> ${esc(r.likelihood||'\u2014')}/${esc(r.impact||'\u2014')} \u00b7 <strong>Standard:</strong> ${esc(r.related_standard||'\u2014')}<br><strong>Description:</strong> ${esc(r.description||'\u2014')}<br><strong>Mitigation:</strong> ${esc(r.mitigation||'\u2014')}</td></tr>`
    ).join("")||`<tr><td colspan="5" class="empty">No risks match the selected filters.</td></tr>`;
    tb.querySelectorAll('tr.clk').forEach(tr=>tr.onclick=()=>{const dd=document.getElementById('det-'+tr.dataset.i);if(dd)dd.style.display=(dd.style.display==='none'?'table-row':'none');});
  };
  selS.onchange=fill; selR.onchange=fill; fill();
}

// ---------- loader (offline file load) ----------
function loadFile(file){const r=new FileReader();r.onload=()=>{try{render(JSON.parse(r.result));
  document.getElementById('drop').innerHTML="Loaded <code>"+esc(file.name)+"</code>.";}catch(e){alert("Invalid JSON: "+e.message);}};r.readAsText(file);}
document.getElementById('pick').onclick=()=>document.getElementById('file').click();
document.getElementById('printView').onclick=printViewer;
document.getElementById('file').onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0]);};
const drop=document.getElementById('drop');
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));
drop.addEventListener('drop',e=>{if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});

// ---------- boot ----------
if(EMBEDDED){render(EMBEDDED);} else {
  document.getElementById('drop').innerHTML="No embedded snapshot. Drag a <code>viewer_data.json</code> here or <button id='pick2'>choose file</button> to load.";
  document.getElementById('pick2')&&(document.getElementById('pick2').onclick=()=>document.getElementById('file').click());
}
